# FundExecs OS — Supabase local config
# Managed by the Supabase CLI. `project_id` is the local stack identifier.
project_id = "fundexecs-os"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000
# NOTE: Supabase flipped the implicit "auto-grant Data API privileges on new
# public tables" default to false on 2026-05-30. The non-standard
# `auto_expose_new_tables` key used to restore that legacy behavior is rejected by
# the hosted branching CLI ("'api' has invalid keys"), so migrations now issue
# explicit GRANTs to anon/authenticated/service_role for the tables they create
# (RLS still governs actual row access). See migration 0048 for the pattern.

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[realtime]
enabled = true

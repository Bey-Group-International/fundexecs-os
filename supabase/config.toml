# FundExecs OS — Supabase local config
# Managed by the Supabase CLI. `project_id` is the local stack identifier.
project_id = "fundexecs-os"

[api]
enabled = true
port = 54321
schemas = ["public", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000
# The migrations rely on Supabase's legacy behavior of auto-granting Data API
# privileges (SELECT/INSERT/UPDATE/DELETE) on new `public` tables to the anon,
# authenticated, and service_role roles. The Supabase CLI flipped this implicit
# default to false on 2026-05-30, which otherwise yields "permission denied for
# table ..." (42501) at runtime. Keep the legacy behavior so the schema is
# reachable without per-table grant migrations.
auto_expose_new_tables = true

[db]
port = 54322
shadow_port = 54320
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "http://localhost:3000"
additional_redirect_urls = ["http://localhost:3000"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[realtime]
enabled = true

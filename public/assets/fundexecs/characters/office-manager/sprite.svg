<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 48" width="32" height="48" shape-rendering="crispEdges">
  <!-- Office Manager pixel-art sprite: smart casual, clipboard in hand -->
  <!-- Hair -->
  <rect x="11" y="2" width="10" height="2" fill="#2d1b00"/>
  <rect x="9"  y="4" width="14" height="3" fill="#3b2200"/>
  <!-- Face -->
  <rect x="10" y="7" width="12" height="8" fill="#f5c9a0"/>
  <!-- Eyes -->
  <rect x="12" y="10" width="2" height="2" fill="#1a0a00"/>
  <rect x="18" y="10" width="2" height="2" fill="#1a0a00"/>
  <!-- Glasses -->
  <rect x="11" y="9"  width="4"  height="1" fill="#444"/>
  <rect x="17" y="9"  width="4"  height="1" fill="#444"/>
  <rect x="15" y="9"  width="2"  height="1" fill="#444"/>
  <rect x="10" y="9"  width="1"  height="4" fill="#444"/>
  <rect x="15" y="9"  width="1"  height="4" fill="#444"/>
  <rect x="21" y="9"  width="1"  height="4" fill="#444"/>
  <!-- Mouth -->
  <rect x="14" y="13" width="4" height="1" fill="#c08060"/>
  <!-- Neck -->
  <rect x="14" y="15" width="4" height="2" fill="#f5c9a0"/>
  <!-- Collar / shirt -->
  <rect x="10" y="17" width="12" height="1" fill="#e8e8e8"/>
  <!-- Body: grey blazer -->
  <rect x="8"  y="18" width="16" height="14" fill="#555e6e"/>
  <!-- Lapels -->
  <rect x="13" y="18" width="2"  height="6"  fill="#f0f0f0"/>
  <rect x="17" y="18" width="2"  height="6"  fill="#f0f0f0"/>
  <!-- Tie -->
  <rect x="15" y="18" width="2"  height="8"  fill="#b22222"/>
  <!-- Clipboard in right hand -->
  <rect x="22" y="20" width="5"  height="7"  fill="#d4a85a"/>
  <rect x="23" y="18" width="3"  height="2"  fill="#888"/>
  <rect x="23" y="21" width="3"  height="1"  fill="#fff"/>
  <rect x="23" y="23" width="3"  height="1"  fill="#ccc"/>
  <rect x="23" y="25" width="2"  height="1"  fill="#ccc"/>
  <!-- Left arm -->
  <rect x="5"  y="18" width="4"  height="10" fill="#555e6e"/>
  <rect x="5"  y="28" width="4"  height="3"  fill="#f5c9a0"/>
  <!-- Trousers: dark navy -->
  <rect x="8"  y="32" width="16" height="10" fill="#1e2a4a"/>
  <!-- Legs split -->
  <rect x="8"  y="38" width="7"  height="6"  fill="#1e2a4a"/>
  <rect x="17" y="38" width="7"  height="6"  fill="#1e2a4a"/>
  <!-- Shoes -->
  <rect x="7"  y="44" width="8"  height="3"  fill="#1a1a1a"/>
  <rect x="17" y="44" width="8"  height="3"  fill="#1a1a1a"/>
</svg>

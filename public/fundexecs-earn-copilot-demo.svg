<svg xmlns="http://www.w3.org/2000/svg" width="1440" height="900" aria-labelledby="title desc" role="img" viewBox="0 0 1440 900"><title id="title">FundExecs OS Earn copilot animated demo</title><desc id="desc">An animated storyboard showing a Pro plan selection and the Earn copilot routing an operating task with blue terminal feedback.</desc><defs><style>@keyframes pulse{50%{opacity:.45;transform:scale(1.08)}}@keyframes scan{0%{opacity:0;transform:translateX(-220px)}20%{opacity:1}}@keyframes reveal{0%,18%{opacity:0;transform:translateY(10px)}28%,82%{opacity:1;transform:translateY(0)}}@media (prefers-reduced-motion:no-preference){.pulse{animation:pulse 2.4s ease-in-out infinite}.scan{animation:scan 2.6s cubic-bezier(.22,1,.36,1) infinite}.step2{animation:reveal 7.2s ease-in-out infinite}.step3,.step4{animation:reveal 7.2s ease-in-out infinite 2.2s;opacity:0}.step4{animation:reveal 7.2s ease-in-out infinite 4.4s}}</style><linearGradient id="panel" x1="0" x2="0" y1="0" y2="1"><stop offset="0" stop-color="#071005"/><stop offset="1" stop-color="#000"/></linearGradient><pattern id="grid" width="32" height="32" patternUnits="userSpaceOnUse"><path fill="none" stroke="#38BDF8" stroke-opacity=".09" d="M32 0H0V32"/></pattern><filter id="glow" width="260%" height="260%" x="-80%" y="-80%"><feGaussianBlur result="blur" stdDeviation="12"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs><rect width="1440" height="900" fill="#000"/><rect width="1440" height="900" fill="url(#grid)"/><text x="82" y="86" fill="#7DD3FC" font-family="JetBrains Mono, monospace" font-size="14" letter-spacing="6">DEMO LOOP</text><text x="82" y="132" fill="#F5F1E8" font-family="Space Grotesk, Arial, sans-serif" font-size="48" font-weight="700">Pro selection to Earn execution</text><g transform="translate(82 190)"><rect width="840" height="562" fill="#050805" stroke="#38BDF8" stroke-opacity=".28" rx="30"/><rect width="776" height="150" x="32" y="40" fill="url(#panel)" stroke="#38BDF8" stroke-opacity=".32" rx="22"/><text x="58" y="82" fill="#7DD3FC" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="4">AVAILABLE BALANCE</text><text x="58" y="142" fill="#F5F1E8" font-family="Space Grotesk, Arial, sans-serif" font-size="56" font-weight="700">� 48,000</text><rect width="224" height="230" x="52" y="238" fill="url(#panel)" stroke="#38BDF8" stroke-opacity=".2" rx="22"/><rect width="224" height="266" x="308" y="220" fill="url(#panel)" stroke="#38BDF8" stroke-opacity=".72" filter="url(#glow)" rx="22"/><rect width="224" height="266" x="308" y="220" fill="none" stroke="#7DD3FC" stroke-width="2" class="step2" rx="22"/><rect width="224" height="230" x="564" y="238" fill="url(#panel)" stroke="#38BDF8" stroke-opacity=".2" rx="22"/><text x="332" y="268" fill="#7DD3FC" font-family="JetBrains Mono, monospace" font-size="11" letter-spacing="4">PRO TIER</text><text x="332" y="310" fill="#F5F1E8" font-family="Space Grotesk, Arial, sans-serif" font-size="36" font-weight="700">Pro</text><path fill="none" stroke="#7DD3FC" stroke-opacity=".7" d="M332 374h48l24-32h58l24-44h28"/><circle cx="404" cy="342" r="7" fill="#38BDF8" class="pulse" filter="url(#glow)"/><rect width="154" height="38" x="332" y="420" fill="#38BDF8" rx="10"/><text x="363" y="444" fill="#000" font-family="DM Sans, Arial, sans-serif" font-size="15" font-weight="700">Choose Pro</text><rect width="120" height="3" x="330" y="456" fill="#7DD3FC" class="scan"/></g><g transform="translate(960 96)"><rect width="398" height="704" fill="#000" stroke="#38BDF8" stroke-opacity=".36" rx="0"/><rect width="398" height="704" fill="url(#grid)" opacity=".55"/><circle cx="318" cy="26" r="116" fill="#38BDF8" class="pulse" filter="url(#glow)" opacity=".16"/><g transform="translate(24 28)"><circle cx="23" cy="23" r="22" fill="#38BDF8" fill-opacity=".18" stroke="#38BDF8" class="pulse"/><text x="60" y="22" fill="#F5F1E8" font-family="DM Sans, Arial, sans-serif" font-size="17" font-weight="700">Earn</text><text x="60" y="42" fill="#7DD3FC" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="3">YOUR OPERATING COPILOT</text></g><g class="step3" transform="translate(24 118)"><rect width="350" height="108" fill="#071005" stroke="#38BDF8" stroke-opacity=".34" rx="16"/><text x="18" y="30" fill="#7DD3FC" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="3">WHERE THINGS STAND</text><text x="18" y="58" fill="#F5F1E8" font-family="DM Sans, Arial, sans-serif" font-size="16">Pro credits activated</text><text x="18" y="84" fill="#B7B0A1" font-family="DM Sans, Arial, sans-serif" font-size="13">Agent throughput reserved for the next run.</text></g><g class="step4" transform="translate(24 260)"><rect width="350" height="84" fill="#38BDF8" fill-opacity=".08" stroke="#38BDF8" stroke-opacity=".36" rx="15"/><text x="18" y="32" fill="#F5F1E8" font-family="DM Sans, Arial, sans-serif" font-size="16">Create weekly LP update</text><text x="18" y="58" fill="#7E7869" font-family="JetBrains Mono, monospace" font-size="10" letter-spacing="2">IR AGENT - NEEDS APPROVAL</text></g><g transform="translate(24 542)"><rect width="350" height="78" fill="#050805" stroke="#38BDF8" stroke-opacity=".28" rx="15"/><text x="18" y="31" fill="#B7B0A1" font-family="DM Sans, Arial, sans-serif" font-size="14">Earn is routing your ask...</text><rect width="120" height="3" x="18" y="60" fill="#7DD3FC" class="scan"/></g><g transform="translate(24 638)"><rect width="350" height="42" fill="#38BDF8" rx="12"/><text x="142" y="27" fill="#000" font-family="DM Sans, Arial, sans-serif" font-size="15" font-weight="700">Ask Earn</text></g></g></svg>
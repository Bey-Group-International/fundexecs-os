<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="robots" content="noindex">
<title>FundExecs OS — Virtual Office</title>
</head>
<body>
<style>
:root{
 --bg:#070c16;--pan:rgba(13,21,38,.72);--pan2:#0e1728;--line:#1c2e4a;--line2:#26406a;
 --gold:#d4a82a;--gold2:#f5d773;--goldsoft:rgba(212,168,42,.42);
 --ink:#dbe6f4;--dim:#8296b4;--faint:#54688a;--good:#4ade80;--info:#38d0ff}
*{margin:0;box-sizing:border-box}
body{background:radial-gradient(135% 105% at 50% -12%,#101a30,#070c16 62%);color:var(--ink);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;height:100vh;overflow:hidden;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased}
button{font-family:inherit}
.top{height:56px;flex:none;display:flex;align-items:center;gap:14px;padding:0 16px;background:linear-gradient(180deg,rgba(18,28,50,.92),rgba(9,15,28,.92));border-bottom:1px solid var(--line);box-shadow:0 1px 0 rgba(245,215,115,.06),0 10px 30px -18px #000;z-index:30;backdrop-filter:blur(12px)}
.brand{display:flex;align-items:center;gap:11px}
.brand .bi{width:22px;height:22px;flex:none;background:linear-gradient(0deg,var(--gold) 0 38%,transparent 0) 0 100%/5px 100% no-repeat,linear-gradient(0deg,var(--gold) 0 64%,transparent 0) 8px 100%/5px 100% no-repeat,linear-gradient(0deg,var(--gold2) 0 100%,transparent 0) 16px 100%/5px 100% no-repeat;filter:drop-shadow(0 0 5px rgba(245,215,115,.45))}
.brand .bt b{color:var(--gold2);font-weight:800;letter-spacing:.17em;font-size:13px;display:block;line-height:1}
.brand .bt small{color:var(--faint);font-size:8px;letter-spacing:.32em;display:block;margin-top:3px}
.tdiv{width:1px;height:28px;background:linear-gradient(180deg,transparent,var(--line2),transparent)}
.tbtn{background:linear-gradient(180deg,#132039,#0d1728);border:1px solid var(--line);color:var(--dim);font:600 11px ui-monospace,monospace;letter-spacing:.09em;padding:8px 13px;border-radius:9px;cursor:pointer;transition:transform .12s,border-color .12s,color .12s,box-shadow .12s}
.tbtn:hover{border-color:var(--goldsoft);color:var(--ink);transform:translateY(-1px);box-shadow:0 8px 18px -10px #000}
.tbtn:active{transform:translateY(0)}
.tbtn.gold{border-color:var(--goldsoft);color:var(--gold2);background:linear-gradient(180deg,#1e2942,#121c31)}
.seg{display:flex;background:#0a1120;border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px}
.seg button{border:0;background:transparent;color:var(--dim);font:700 11px ui-monospace,monospace;letter-spacing:.11em;padding:6px 16px;border-radius:7px;cursor:pointer;transition:.14s}
.seg button.on{background:linear-gradient(180deg,#28334f,#161f36);color:var(--gold2);box-shadow:inset 0 0 0 1px var(--goldsoft),0 3px 9px -4px #000}
.spacer{flex:1}
.main{flex:1;display:flex;min-height:0;gap:11px;padding:11px}
.pal,.panel{background:var(--pan);border:1px solid var(--line);border-radius:15px;box-shadow:0 26px 60px -30px #000,inset 0 1px 0 rgba(245,215,115,.05);backdrop-filter:blur(14px)}
.leftcol{width:250px;flex:none;display:flex;flex-direction:column;gap:9px;min-height:0}
/* ---- Spot-style Build Mode panel ---- */
.bmhead{display:flex;align-items:center;gap:8px;padding:1px 3px;flex:none}
.bmtitle{flex:1;color:var(--gold2);font:800 11px ui-monospace,monospace;letter-spacing:.17em}
.bmlayers{width:30px;height:26px;flex:none;border:1px solid var(--line);background:linear-gradient(180deg,#132039,#0d1728);color:var(--dim);border-radius:8px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
.bmlayers svg{width:14px;height:14px;fill:none;stroke:currentColor;stroke-width:1.5;stroke-linejoin:round}
.bmlayers:hover{border-color:var(--goldsoft);color:var(--gold2)}
.bmlayers.on{border-color:var(--gold2);color:var(--gold2);box-shadow:inset 0 0 0 1px var(--goldsoft)}
.bmtabs{display:flex;background:#0a1120;border:1px solid var(--line);border-radius:10px;padding:3px;gap:2px;flex:none}
.bmtabs button{flex:1;border:0;background:transparent;color:var(--dim);font:700 8.5px ui-monospace,monospace;letter-spacing:.04em;padding:8px 2px;border-radius:7px;cursor:pointer;text-transform:uppercase;transition:.12s}
.bmtabs button.on{background:linear-gradient(180deg,#28334f,#161f36);color:var(--gold2);box-shadow:inset 0 0 0 1px var(--goldsoft)}
.bmsearch{position:relative;flex:none}
.bmsearch input{width:100%;background:#0a1120;border:1px solid var(--line);color:var(--ink);font:600 11px ui-monospace,monospace;padding:8px 9px 8px 30px;border-radius:9px;outline:0;transition:border-color .12s}
.bmsearch input:focus{border-color:var(--goldsoft);box-shadow:0 0 0 3px rgba(212,168,42,.12)}
.bmsearch input::placeholder{color:var(--faint)}
.bmsearch .si{position:absolute;left:10px;top:9px;width:13px;height:13px;color:var(--faint);pointer-events:none}
.bmbody{flex:1;display:flex;gap:7px;min-height:0}
.bmrail{flex:none;width:40px;display:flex;flex-direction:column;gap:5px;overflow-y:auto;padding:1px}
.bmrail::-webkit-scrollbar{width:0}
.bmrail button{width:36px;height:36px;flex:none;border:1px solid var(--line);background:linear-gradient(180deg,#111d34,#0c1524);color:#7fa6d8;border-radius:9px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
.bmrail button svg{width:17px;height:17px}
.bmrail button:hover{border-color:var(--goldsoft);color:var(--gold2);transform:translateY(-1px)}
.bmrail button.on{border-color:var(--gold2);color:var(--gold2);box-shadow:inset 0 0 0 1px var(--goldsoft)}
.tsec{margin-bottom:15px}
.tgrid{display:grid;grid-template-columns:1fr 1fr;gap:7px}
.tcard{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;min-height:80px;background:linear-gradient(180deg,#111d34,#0c1524);border:1px solid var(--line);border-radius:11px;color:#a9bad2;font:600 9px ui-monospace,monospace;letter-spacing:.02em;cursor:pointer;transition:transform .12s,border-color .12s,color .12s,box-shadow .12s;text-align:center;padding:8px 5px}
.tcard .ic{width:28px;height:28px;color:#7fa6d8;transition:.12s}
.tcard:hover{border-color:var(--goldsoft);color:#fff;transform:translateY(-2px);box-shadow:0 12px 22px -14px #000,inset 0 0 0 1px rgba(245,215,115,.06)}
.tcard:hover .ic{color:var(--gold2)}
.tcard.wide{grid-column:span 2;flex-direction:row;justify-content:flex-start;min-height:0;gap:10px;padding:11px 13px;background:linear-gradient(180deg,#17233c,#111b30);color:var(--gold2)}
.tcard.wide .ic{width:19px;height:19px;color:var(--gold2)}
.tcard.tool{background:linear-gradient(180deg,#132a2e,#0d1a1e);border-color:#2f5a62}
.tcard.tool .ic{color:#7fd8e2}
.tcard.tool:hover{border-color:#7fd8e2}
.tcard.on{border-color:var(--gold2);color:var(--gold2);box-shadow:inset 0 0 0 1px var(--goldsoft)}
.envrow{display:flex;align-items:center;gap:8px;width:100%;padding:11px 12px;margin-bottom:7px;background:linear-gradient(180deg,#111d34,#0c1524);border:1px solid var(--line);border-radius:10px;cursor:pointer;transition:.12s}
.envrow:hover{border-color:var(--goldsoft)}
.envrow .er-l{flex:1;display:flex;flex-direction:column;gap:3px;text-align:left}
.envrow .er-l b{color:var(--ink);font:700 10.5px ui-monospace,monospace;letter-spacing:.03em}
.envrow .er-l small{color:var(--faint);font:600 8.5px ui-monospace,monospace}
.envrow .er-t{flex:none;font:800 8.5px ui-monospace,monospace;letter-spacing:.1em;color:var(--faint);padding:3px 8px;border-radius:6px;background:#0a1120;border:1px solid var(--line)}
.envrow.on{border-color:var(--goldsoft)}
.envrow.on .er-t{color:#0b1220;background:var(--gold2);border-color:var(--gold2)}
/* floating action toolbar over the canvas (Spot-style) */
.fabbar{position:absolute;top:14px;left:50%;transform:translateX(-50%);z-index:15;display:flex;align-items:center;gap:3px;background:linear-gradient(180deg,rgba(19,29,52,.95),rgba(10,16,30,.95));border:1px solid var(--line);border-radius:14px;padding:5px;box-shadow:0 18px 44px -22px #000,inset 0 1px 0 rgba(245,215,115,.06);backdrop-filter:blur(10px)}
.fabbar button{width:37px;height:37px;border:0;background:transparent;color:var(--dim);border-radius:10px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:.12s}
.fabbar button svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.6;stroke-linecap:round;stroke-linejoin:round}
.fabbar button:hover{background:#18253d;color:var(--gold2)}
.fabbar button.on{background:linear-gradient(180deg,#28334f,#161f36);color:var(--gold2);box-shadow:inset 0 0 0 1px var(--goldsoft)}
.fabbar .fabdone{background:linear-gradient(180deg,#1f7a44,#155f34);color:#eafff1;box-shadow:0 5px 14px -5px #0a3a20}
.fabbar .fabdone:hover{background:linear-gradient(180deg,#279a55,#1a7a44);color:#fff}
.fabdiv{width:1px;height:22px;background:var(--line2);margin:0 3px}
.ambient{position:absolute;inset:0;z-index:3;pointer-events:none;border-radius:16px;transition:background .4s,box-shadow .4s}
body.previewing .leftcol,body.previewing .panel{display:none}
body.previewing .fabbar{top:14px}
.ltabs{display:flex;background:#0a1120;border:1px solid var(--line);border-radius:11px;padding:3px;gap:2px;flex:none}
.ltabs button{flex:1;border:0;background:transparent;color:var(--dim);font:700 10px ui-monospace,monospace;letter-spacing:.11em;padding:8px 4px;border-radius:8px;cursor:pointer;transition:.14s;display:flex;align-items:center;justify-content:center;gap:6px}
.ltabs button.on{background:linear-gradient(180deg,#28334f,#161f36);color:var(--gold2);box-shadow:inset 0 0 0 1px var(--goldsoft),0 3px 9px -4px #000}
.pal,.layers{flex:1;overflow:auto;padding:13px;min-height:0}
.layers{padding:9px}
.pal::-webkit-scrollbar,.panel::-webkit-scrollbar,.layers::-webkit-scrollbar{width:8px}.pal::-webkit-scrollbar-thumb,.panel::-webkit-scrollbar-thumb,.layers::-webkit-scrollbar-thumb{background:#1c2b45;border-radius:8px}
.lroot{display:flex;align-items:center;gap:8px;padding:8px 9px;margin-bottom:8px;border-radius:9px;background:linear-gradient(180deg,#141f38,#0e1728);border:1px solid var(--line);color:var(--gold2);font:700 9.5px ui-monospace,monospace;letter-spacing:.11em}
.lroot .bi{width:13px;height:13px;flex:none;background:linear-gradient(0deg,var(--gold) 0 38%,transparent 0) 0 100%/3px 100% no-repeat,linear-gradient(0deg,var(--gold) 0 64%,transparent 0) 5px 100%/3px 100% no-repeat,linear-gradient(0deg,var(--gold2) 0 100%,transparent 0) 10px 100%/3px 100% no-repeat}
.lrow{display:flex;align-items:center;gap:5px;padding:5px 5px;border-radius:7px;cursor:pointer;transition:background .1s;color:#a9bad2;font:600 10.5px ui-monospace,monospace;user-select:none}
.lrow:hover{background:#131f36}
.lrow.sel{background:rgba(212,168,42,.15);box-shadow:inset 0 0 0 1px var(--goldsoft)}
.lrow.room{color:var(--ink);font-weight:700;letter-spacing:.02em}
.lrow.prop{margin-left:15px}
.lrow.prop .nm{color:#8fa4c4;font-weight:600}
.lrow.dragover{box-shadow:inset 0 2px 0 0 var(--gold2)}
.lrow.dim{opacity:.42}
.lrow.hid .nm{opacity:.5;text-decoration:line-through;text-decoration-color:var(--faint)}
.lrow .cav{width:12px;flex:none;text-align:center;color:var(--faint);font-size:9px}
.lrow .gh{width:10px;flex:none;color:var(--faint);cursor:grab;font-size:11px;line-height:1;opacity:.45}
.lrow:hover .gh{opacity:.9}
.lrow .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lrow .nm input{width:100%;background:#0a1120;border:1px solid var(--goldsoft);color:var(--ink);font:inherit;padding:1px 5px;border-radius:5px;outline:0}
.lrow .badge{flex:none;color:var(--faint);font-size:8.5px;font-variant-numeric:tabular-nums;padding:0 2px}
.lrow .lic{width:19px;height:19px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:5px;color:var(--faint);cursor:pointer;transition:.1s;opacity:.72}
.lrow:hover .lic{opacity:1}
.lrow .lic:hover{background:#1c2b45;color:var(--gold2)}
.lrow .lic.act{color:var(--gold2);opacity:1}
.lrow .lic.off{color:#7a3f45}
.lrow .lic svg{width:12.5px;height:12.5px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.lgroup{margin-bottom:1px}
.lempty{color:var(--faint);font-size:10.5px;text-align:center;padding:22px 10px;line-height:1.7}.lempty b{color:var(--gold2)}
.lrow.insel{background:rgba(212,168,42,.08)}
.lroot .rt{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lroot .lic{width:19px;height:19px;flex:none;display:flex;align-items:center;justify-content:center;border-radius:5px;color:var(--faint);cursor:pointer;opacity:.75;transition:.1s}
.lroot .lic:hover{background:#1c2b45;color:var(--gold2);opacity:1}
.lroot .lic.off{color:#7a3f45}.lroot .lic.act{color:var(--gold2);opacity:1}
.lroot .lic svg{width:12.5px;height:12.5px;fill:none;stroke:currentColor;stroke-width:1.7;stroke-linecap:round;stroke-linejoin:round}
.laytop{display:flex;align-items:center;gap:7px;padding:4px 8px 8px}
.laytop .lsi{width:13px;height:13px;flex:none;color:var(--faint)}
.laysearch{flex:1;background:#0a1120;border:1px solid var(--line);color:var(--ink);font:600 10.5px ui-monospace,monospace;padding:6px 9px;border-radius:8px;outline:0;transition:border-color .12s}
.laysearch:focus{border-color:var(--goldsoft);box-shadow:0 0 0 3px rgba(212,168,42,.12)}
.laysearch::placeholder{color:var(--faint)}
.pgroup{margin-bottom:15px}
.gh{display:flex;align-items:center;gap:9px;color:var(--gold2);font-size:9px;letter-spacing:.2em;margin:0 2px 9px;text-transform:uppercase;opacity:.85}
.gh::after{content:"";flex:1;height:1px;background:linear-gradient(90deg,var(--goldsoft),transparent)}
.pgrid{display:grid;grid-template-columns:1fr 1fr;gap:6px}
.pitem{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 4px;background:linear-gradient(180deg,#111d34,#0c1524);border:1px solid var(--line);border-radius:10px;color:#a9bad2;font:600 9.5px ui-monospace,monospace;letter-spacing:.03em;cursor:pointer;transition:transform .12s,border-color .12s,color .12s,box-shadow .12s}
.pitem:hover{border-color:var(--goldsoft);color:#fff;transform:translateY(-2px);box-shadow:0 10px 20px -12px #000,inset 0 0 0 1px rgba(245,215,115,.06)}
.pitem .ic{width:19px;height:19px;color:#7fa6d8}
.pitem:hover .ic{color:var(--gold2)}
.pitem.wide{grid-column:span 2;flex-direction:row;justify-content:center;gap:9px;padding:11px;background:linear-gradient(180deg,#17233c,#111b30);color:var(--gold2)}
.pitem.wide .ic{color:var(--gold2)}
.stage{flex:1;position:relative;overflow:hidden;border-radius:16px;border:1px solid var(--line);background:radial-gradient(120% 120% at 50% -5%,#0e1a30,#070c16 70%);box-shadow:inset 0 0 0 1px rgba(245,215,115,.04),0 30px 80px -44px #000}
.canvas{position:absolute;inset:0}
.canvas svg{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%) scale(var(--z,1));width:auto;height:96%;image-rendering:auto}
.ovwrap{position:absolute;top:50%;left:50%;transform-origin:center;pointer-events:none}
.sel{position:absolute;inset:0;pointer-events:none;z-index:6}
.brk{position:absolute;width:26px;height:26px;pointer-events:none;z-index:5;opacity:.5}
.brk.tl{top:12px;left:12px;border-top:2px solid var(--gold);border-left:2px solid var(--gold);border-radius:4px 0 0 0}
.brk.tr{top:12px;right:12px;border-top:2px solid var(--gold);border-right:2px solid var(--gold);border-radius:0 4px 0 0}
.brk.bl{bottom:12px;left:12px;border-bottom:2px solid var(--gold);border-left:2px solid var(--gold);border-radius:0 0 0 4px}
.brk.br{bottom:12px;right:12px;border-bottom:2px solid var(--gold);border-right:2px solid var(--gold);border-radius:0 0 4px 0}
.vig{position:absolute;inset:0;pointer-events:none;z-index:4;box-shadow:inset 0 0 120px rgba(4,8,16,.55);border-radius:16px}
.zoom{position:absolute;right:14px;bottom:14px;z-index:12;display:flex;align-items:center;gap:2px;background:rgba(11,18,34,.82);border:1px solid var(--line);border-radius:11px;padding:4px;backdrop-filter:blur(8px);box-shadow:0 10px 24px -14px #000}
.zoom button{width:30px;height:28px;border:0;background:transparent;color:var(--dim);font:700 15px ui-monospace,monospace;border-radius:7px;cursor:pointer;transition:.12s}
.zoom button:hover{background:#18253d;color:var(--gold2)}
.zoom .zl{min-width:46px;text-align:center;color:var(--ink);font-size:11px;font-variant-numeric:tabular-nums}
.coord{position:absolute;left:14px;bottom:14px;z-index:12;background:rgba(11,18,34,.82);border:1px solid var(--line);border-radius:9px;padding:6px 11px;color:var(--dim);font-size:10px;letter-spacing:.06em;font-variant-numeric:tabular-nums;backdrop-filter:blur(8px)}
.coord b{color:var(--gold2)}
.status{position:absolute;left:50%;transform:translateX(-50%);bottom:15px;z-index:11;color:var(--faint);font-size:10px;letter-spacing:.1em;text-transform:uppercase}
.panel{width:266px;flex:none;position:relative;transition:width .22s cubic-bezier(.4,0,.2,1)}
.pbody{height:100%;overflow:auto;padding:15px}
.panel.collapsed{width:0}
.panel.collapsed .pbody{opacity:0;pointer-events:none}
.ptoggle{position:absolute;top:14px;left:-13px;z-index:14;width:26px;height:40px;display:flex;align-items:center;justify-content:center;background:linear-gradient(180deg,#17233c,#111b30);border:1px solid var(--line);border-right:0;color:var(--dim);border-radius:9px 0 0 9px;cursor:pointer;transition:color .12s,border-color .12s,background .12s;box-shadow:-6px 0 16px -10px #000}
.ptoggle:hover{color:var(--gold2);border-color:var(--goldsoft);background:linear-gradient(180deg,#1e2942,#121c31)}
.ptoggle span{font-size:15px;line-height:1;transition:transform .22s cubic-bezier(.4,0,.2,1)}
.panel.collapsed .ptoggle span{transform:rotate(180deg)}
.panel.collapsed .ptoggle{left:-27px;border-radius:9px}
.panel h3{color:var(--gold2);font-size:11px;letter-spacing:.13em;margin-bottom:4px;text-transform:uppercase;display:flex;align-items:center;gap:8px}
.panel .sub{color:var(--faint);font-size:9px;letter-spacing:.14em;text-transform:uppercase;margin-bottom:14px}
.panel label{display:block;font-size:9px;letter-spacing:.12em;color:var(--dim);margin:12px 0 4px;text-transform:uppercase}
.panel input,.panel select{width:100%;background:#0a1120;border:1px solid var(--line);color:var(--ink);font:600 12px ui-monospace,monospace;padding:8px 9px;border-radius:8px;transition:border-color .12s,box-shadow .12s}
.panel input:focus,.panel select:focus{outline:0;border-color:var(--goldsoft);box-shadow:0 0 0 3px rgba(212,168,42,.14)}
.panel input[type=number]{font-variant-numeric:tabular-nums}
.row2{display:flex;gap:8px}.row2>div{flex:1}
.field{margin-top:0}
.segm{display:flex;background:#0a1120;border:1px solid var(--line);border-radius:8px;padding:3px;gap:2px}
.segm button{flex:1;border:0;background:transparent;color:var(--dim);font:700 10px ui-monospace,monospace;letter-spacing:.08em;padding:6px 4px;border-radius:6px;cursor:pointer;text-transform:uppercase}
.segm button.on{background:linear-gradient(180deg,#26314d,#161f36);color:var(--gold2);box-shadow:inset 0 0 0 1px var(--goldsoft)}
.swatches{display:flex;gap:6px;flex-wrap:wrap;align-items:center;margin-bottom:6px}
.sw{width:24px;height:24px;border-radius:7px;cursor:pointer;border:1px solid rgba(255,255,255,.14);transition:transform .1s}
.sw:hover{transform:scale(1.12)}
.sw.on{box-shadow:0 0 0 2px var(--gold2),0 0 0 4px rgba(212,168,42,.25)}
.chip{display:inline-flex;align-items:center;gap:6px;padding:3px 9px;border-radius:999px;font-size:9px;letter-spacing:.1em;text-transform:uppercase;font-weight:700}
.chip.room{background:rgba(212,168,42,.12);color:var(--gold2);border:1px solid var(--goldsoft)}
.chip.prop{background:rgba(56,208,255,.1);color:var(--info);border:1px solid rgba(56,208,255,.3)}
.chip.zone{background:rgba(244,114,182,.12);color:#ffb0dc;border:1px solid rgba(244,114,182,.4)}
.panel .del{margin-top:18px;width:100%;padding:10px;background:linear-gradient(180deg,#2a1218,#1a0c10);border:1px solid #7a2f3a;color:#ff9aa5;border-radius:9px;font:700 11px ui-monospace,monospace;letter-spacing:.08em;cursor:pointer;transition:.12s}
.panel .del:hover{border-color:#ff6b7a;color:#fff;background:linear-gradient(180deg,#3a1620,#240e14)}
.panel .dup{margin-top:8px;width:100%;padding:9px;background:linear-gradient(180deg,#132039,#0d1728);border:1px solid var(--line);color:var(--dim);border-radius:9px;font:700 11px ui-monospace,monospace;letter-spacing:.08em;cursor:pointer;transition:.12s}

<script>
// ===================== ISOMETRIC ENGINE =====================
const TOP={UX:30,UY:20,VZ:10,OX:-28,OY:10,SW:1204,SH:735,mode:'top'};   // 2.5D overhead — landscape framing to fill wide stages
const FP={FOCAL:680,OX:870,OY:612,SW:1740,SH:1150,mode:'fp'};              // first-person perspective
let MODE='top';
const C=()=>MODE==='fp'?FP:TOP;
let ROT=null; // {cx,cy,cos,sin} — active world-space rotation while drawing a prop
let YAW=0, YAWC={x:0,y:0}; // retained (scene centre); top-down has no orbit
let CAM={x:20,y:33,z:1.62,yaw:Math.PI}; // first-person camera: floor pos, eye height, look yaw
const NEARP=0.12;
function rotW(x,y){if(ROT){const dx=x-ROT.cx,dy=y-ROT.cy;return [ROT.cx+dx*ROT.cos-dy*ROT.sin,ROT.cy+dx*ROT.sin+dy*ROT.cos];}return [x,y];}
function P(x,y,z=0){const c=C();[x,y]=rotW(x,y);
  if(MODE==='fp'){const dx=x-CAM.x,dy=y-CAM.y,cs=Math.cos(CAM.yaw),sn=Math.sin(CAM.yaw);const f=Math.max(dx*sn+dy*cs,0.05),r=dy*sn-dx*cs,u=z-CAM.z;return [c.OX+(r/f)*c.FOCAL,c.OY-(u/f)*c.FOCAL];}

  return [c.OX+x*c.UX,c.OY+y*c.UY-z*c.VZ];}
function camF(x,y){[x,y]=rotW(x,y);const dx=x-CAM.x,dy=y-CAM.y;return dx*Math.sin(CAM.yaw)+dy*Math.cos(CAM.yaw);}
// perspective polygon projection with near-plane clipping — for floors & box faces in FP
function projFP(ptsW){const c=C(),cs=Math.cos(CAM.yaw),sn=Math.sin(CAM.yaw);const cam=ptsW.map(([x,y,z])=>{[x,y]=rotW(x,y);const dx=x-CAM.x,dy=y-CAM.y;return {f:dx*sn+dy*cs,r:dy*sn-dx*cs,u:z-CAM.z};});const out=[];for(let i=0;i<cam.length;i++){const A=cam[i],B=cam[(i+1)%cam.length];const Ain=A.f>=NEARP,Bin=B.f>=NEARP;if(Ain)out.push(A);if(Ain!==Bin){const t=(NEARP-A.f)/(B.f-A.f);out.push({f:NEARP,r:A.r+(B.r-A.r)*t,u:A.u+(B.u-A.u)*t});}}return out.map(p=>[c.OX+(p.r/p.f)*c.FOCAL,c.OY-(p.u/p.f)*c.FOCAL]);}
const FOOT={desk:[2.1,1.05],chair:[.85,.85],plant:[1,1],sofa:[2.3,1],armchair:[1,1],coffee:[1.3,.9],conf:[3,2.6],books:[1.6,.6],cabinet:[.9,.7],board:[3,.5],recep:[4,1.4],stool:[.5,.5],bar:[3,.8],lamp:[.6,.6],printer:[.9,.8],rug:[3,2],glass:[3,.5],spawn:[1,1],entry:[1,1],raise:[2,1.7],jumbo:[28,2],booth:[1.4,1.4],walltv:[2.6,.4],divider:[2.4,.24],water:[.7,.7],flip:[1,.7],credenza:[2.4,.7],podium:[.9,.7],vault:[1.4,.8],column:[.8,.8],tree:[1.4,1.4],bench:[2.2,.7],kiosk:[.8,.6],vending:[1,.8],fridge:[1,.8],counter:[2.4,.7],locker:[1.6,.5],flag:[.6,.6],barrier:[.5,.5],deskL:[2.4,1.6],fireplace:[1.8,.6],media:[2.2,.5],roundtable:[2.6,2.6],cafetable:[1.1,1.1],deskexec:[2.6,1.2],logo:[.9,.3],execchair:[.85,.85],loveseat:[1.6,1],ottoman:[.9,.9],squaretable:[2,2],poseur:[1.2,1.2],sidetable:[.8,.8],standdesk:[2,1],cactus:[.7,.7],planter:[2,.6],shelf:[1.2,.5],wardrobe:[1.1,.6],floorlamp:[.6,.6],uplight:[.5,.5],sculpture:[.8,.8],hoststand:[.9,.6]};
function worldFrom(sx,sy){const c=C();if(MODE==='fp'){const rr=(sx-c.OX)/c.FOCAL,uu=-(sy-c.OY)/c.FOCAL;if(uu>-1e-3)return [CAM.x,CAM.y];const cs=Math.cos(CAM.yaw),sn=Math.sin(CAM.yaw);const f=-CAM.z/uu;return [CAM.x+f*(sn-rr*cs),CAM.y+f*(cs+rr*sn)];}
  let rx=(sx-c.OX)/c.UX, ry=(sy-c.OY)/c.UY;
  if(YAW){const dx=rx-YAWC.x,dy=ry-YAWC.y,cs=Math.cos(-YAW),sn=Math.sin(-YAW);rx=YAWC.x+dx*cs-dy*sn;ry=YAWC.y+dx*sn+dy*cs;}
  return [rx,ry];}
const pts=a=>a.map(p=>((p[0]*10|0)/10)+","+((p[1]*10|0)/10)).join(" ");
function shade(hex,f){let n=parseInt(hex.slice(1),16);let r=(n>>16)&255,g=(n>>8)&255,b=n&255;r=Math.min(255,r*f)|0;g=Math.min(255,g*f)|0;b=Math.min(255,b*f)|0;return "#"+((1<<24)+(r<<16)+(g<<8)+b).toString(16).slice(1);}
let draws=[],overlays=[];
let CURP=null; // prop currently being rendered — lets PR.* renderers look up live activity by prop id
// ---- activity state: the map's awareness of what's happening on the floor ----
// runtime-only overlay (never saved): simulated OR fed real data via window.FundExecsActivity
const ACT={on:true,rooms:{},raises:{},feed:[],ext:{}};
const actPct=p=>{const st=ACT.raises[p.id];return Math.max(0,Math.min(100,Math.round(st&&st.pct!=null?st.pct:(+p.args[5]||0))));};
function push(ax,ay,svg){if(svg===undefined){draws.push({k:ax,svg:ay});return;}let k;if(MODE==='fp')k=-camF(ax,ay);else if(YAW){const dx=ax-YAWC.x,dy=ay-YAWC.y,cs=Math.cos(YAW),sn=Math.sin(YAW);k=(YAWC.y+dx*sn+dy*cs)+(YAWC.x+dx*cs-dy*sn)*1e-4;}else k=ay+ax*1e-4;draws.push({k,svg});}
function overlay(x,y,z,html,cls,ww,dd){if(MODE==='fp')return;const p=P(x,y,z);let ws='';if(ww){let xs;if(dd){xs=[P(x-ww/2,y-dd/2,z)[0],P(x+ww/2,y-dd/2,z)[0],P(x+ww/2,y+dd/2,z)[0],P(x-ww/2,y+dd/2,z)[0]];}else{xs=[P(x-ww/2,y,z)[0],P(x+ww/2,y,z)[0]];}const w=Math.max(20,Math.max(...xs)-Math.min(...xs));const fs=Math.max(4.5,Math.min(w*0.15,15));ws=`width:${w.toFixed(1)}px;overflow:hidden;font-size:${fs.toFixed(2)}px;`;}overlays.push(`<div class="ov ${cls}" style="${ws}left:${p[0]}px;top:${p[1]}px">${html}</div>`);}
// ---- surface-mapped text: paints HTML directly onto an object's projected face ----
const _measCtx=document.createElement('canvas').getContext('2d');
function measTxt(t,px,wt){_measCtx.font=`${wt} ${px}px ui-monospace,SFMono-Regular,monospace`;return _measCtx.measureText(t).width;}
function fitPx(t,availW,min,max,wt){let lo=min,hi=Math.max(min,max),best=min;for(let i=0;i<12&&lo<=hi;i++){const m=(lo+hi)/2;if(measTxt(String(t),m,wt)<=availW){best=m;lo=m+.25;}else hi=m-.25;}return best;}
// face rect: constant-y plane, x..x+w, z0..z0+h. Maps html onto that quad so text sits ON the surface.
function surfaceLabel(x,y,z0,w,h,html,cls,opt={}){
  if(MODE==='fp'){ // first person: paint the label onto the screen as depth-sorted SVG text
    const fp=opt.fp;if(!fp||camF(x+w/2,y)<0.3)return;
    const TL=P(x,y,z0+h),TR=P(x+w,y,z0+h),BR=P(x+w,y,z0),BL=P(x,y,z0);
    if((TR[0]-TL[0])*(BL[1]-TL[1])-(TR[1]-TL[1])*(BL[0]-TL[0])<=0)return; // viewing the back of the surface — text unreadable, skip
    const fw=Math.hypot(TR[0]-TL[0],TR[1]-TL[1]),fh=Math.hypot(BL[0]-TL[0],BL[1]-TL[1]);
    if(fw<9)return; // too far to read
    const cx=(TL[0]+TR[0]+BR[0]+BL[0])/4,cy=(TL[1]+TR[1]+BR[1]+BL[1])/4;
    const ang=Math.atan2(TR[1]-TL[1],TR[0]-TL[0])*180/Math.PI;
    const fs=Math.min(fh*0.5,fitPx(fp,fw*0.9,3,fh*0.55,800));
    push(x+w/2,y,`<text x="${cx.toFixed(1)}" y="${cy.toFixed(1)}" fill="${opt.fpCol||'#eaf4ff'}" font-family="ui-monospace,monospace" font-weight="800" font-size="${fs.toFixed(1)}" letter-spacing="0.5" text-anchor="middle" dominant-baseline="central" transform="rotate(${ang.toFixed(2)} ${cx.toFixed(1)} ${cy.toFixed(1)})" style="paint-order:stroke;stroke:#05101e;stroke-width:${(fs*0.14).toFixed(2)}px">${fp}</text>`);
    return;
  }
  const TL=P(x,y,z0+h),TR=P(x+w,y,z0+h),BL=P(x,y,z0);
  const bx=TR[0]-TL[0],by=TR[1]-TL[1],cx=BL[0]-TL[0],cy=BL[1]-TL[1];
  const Lw=Math.max(1,Math.hypot(bx,by)),Lh=Math.max(1,Math.hypot(cx,cy));
  const det=bx*cy-by*cx; // signed area: ≤0 means we're looking at the BACK of the surface (text would mirror)
  const kf=det/(Lw*Lh);  // 1 = face-on … 0 = edge-on foreshortening
  if(det<=0||Lw<9||kf<0.18)return; // back-facing or an edge-on sliver — text can't sit on the face, skip instead of bleeding
  const a=bx/Lw,b=by/Lw,c=cx/Lh,d=cy/Lh;
  let fs=Lh*(opt.fill||0.6);
  if(opt.measure!=null){const availW=Lw*(1-2*(opt.padX!=null?opt.padX:0.06));fs=Math.min(fs,fitPx(opt.measure,availW,2.4,fs,opt.weight||800));}
  const op=kf<0.55?Math.max(0.12,(kf-0.18)/0.37).toFixed(2):null; // fade out as the face turns edge-on
  overlays.push(`<div class="ovs ${cls}" style="width:${Lw.toFixed(2)}px;height:${Lh.toFixed(2)}px;font-size:${fs.toFixed(2)}px;${op?`opacity:${op};`:''}transform:matrix(${a.toFixed(4)},${b.toFixed(4)},${c.toFixed(4)},${d.toFixed(4)},${TL[0].toFixed(2)},${TL[1].toFixed(2)})">${html}</div>`);
}
const poly=(a,fill,stroke,sw,op)=>`<polygon points="${pts(a)}" fill="${fill}"${stroke?` stroke="${stroke}" stroke-width="${sw}"`:''}${op?` opacity="${op}"`:''}/>`;
function shadow(x,y,w,d,op=.28){if(MODE==='fp')return;const c=P(x+w/2,y+d/2,0),s=C();const rx=(w+d)*s.UX*.5*.4,ry=(w+d)*s.UY*.32*.4;push(x+w/2,y+d/2-.02,`<ellipse cx="${c[0]}" cy="${c[1]}" rx="${rx}" ry="${ry}" fill="#04070d" opacity="${op}" filter="url(#blur)"/>`);}
function box(x,y,w,d,h,base,opt={}){const z0=opt.z0||0,z1=z0+h;const top=opt.topGrad||shade(base,1.14),stroke=opt.stroke??shade(base,.4),sw=opt.sw??.7;
  if(MODE==='fp'){const cxb=x+w/2,cyb=y+d/2;if(camF(cxb,cyb)<-Math.max(w,d,h)-.3)return; // fully behind camera
    const F=[];
    if(CAM.x<=x)F.push([[[x,y,z0],[x,y+d,z0],[x,y+d,z1],[x,y,z1]],opt.lGrad||shade(base,.5)]);
    if(CAM.x>=x+w)F.push([[[x+w,y+d,z0],[x+w,y,z0],[x+w,y,z1],[x+w,y+d,z1]],opt.rGrad||shade(base,.72)]);
    if(CAM.y<=y)F.push([[[x+w,y,z0],[x,y,z0],[x,y,z1],[x+w,y,z1]],opt.fGrad||shade(base,.62)]);
    if(CAM.y>=y+d)F.push([[[x,y+d,z0],[x+w,y+d,z0],[x+w,y+d,z1],[x,y+d,z1]],opt.rGrad||shade(base,.68)]);
    if(CAM.z>=z1)F.push([[[x,y,z1],[x+w,y,z1],[x+w,y+d,z1],[x,y+d,z1]],top]);
    else if(CAM.z<=z0)F.push([[[x,y,z0],[x,y+d,z0],[x+w,y+d,z0],[x+w,y,z0]],shade(base,.34)]);
    let s='';F.map(f=>({d:Math.min(...f[0].map(p=>camF(p[0],p[1]))),pw:f[0],fill:f[1]})).sort((a,b)=>b.d-a.d).forEach(f=>{const sp=projFP(f.pw);if(sp.length>=3)s+=poly(sp,f.fill,stroke,sw);});
    if(opt.gloss&&!MOVING&&CAM.z>=z1){const sp=projFP([[x,y,z1],[x+w,y,z1],[x+w,y+d,z1],[x,y+d,z1]]);if(sp.length>=3)s+=poly(sp,'url(#gloss)',null,0,.4);}
    if(s)push(cxb,cyb,s);return;}
  const A=P(x,y,z1),B=P(x+w,y,z1),Cc=P(x+w,y+d,z1),D=P(x,y+d,z1);let s="";
  if(!YAW){const Cb=P(x+w,y+d,z0),Db=P(x,y+d,z0);s+=poly([D,Cc,Cb,Db],opt.fGrad||shade(base,.6),stroke,sw);}
  else{const cs=Math.cos(YAW),sn=Math.sin(YAW),vis=(nx,ny)=>(nx*sn+ny*cs)>0.001,sf=opt.fGrad||shade(base,.58),F=[];
    if(vis(0,1))F.push([[x,y+d,z1],[x+w,y+d,z1],[x+w,y+d,z0],[x,y+d,z0]]);
    if(vis(0,-1))F.push([[x+w,y,z1],[x,y,z1],[x,y,z0],[x+w,y,z0]]);
    if(vis(1,0))F.push([[x+w,y,z1],[x+w,y+d,z1],[x+w,y+d,z0],[x+w,y,z0]]);
    if(vis(-1,0))F.push([[x,y+d,z1],[x,y,z1],[x,y,z0],[x,y+d,z0]]);
    F.forEach(pw=>{s+=poly(pw.map(pp=>P(pp[0],pp[1],pp[2])),sf,stroke,sw);});}
  s+=poly([A,B,Cc,D],top,stroke,sw);if(opt.gloss&&!MOVING)s+=poly([A,B,Cc,D],'url(#gloss)',null,0,.45);push(x+w/2,y+d/2+(opt.dbias||0),s);}
function panelFace(x,y,z0,w,h,grad,cls='scr'){if(MODE==='fp'){const sp=projFP([[x,y,z0+h],[x+w,y,z0+h],[x+w,y,z0],[x,y,z0]]);if(sp.length>=3)push(x+w/2,y,`<polygon class="${cls}" points="${pts(sp)}" fill="url(#${grad})" filter="url(#glow)"/>`+poly(sp,'url(#sheen)',null,0,.3));return;}const q=[P(x,y,z0+h),P(x+w,y,z0+h),P(x+w,y,z0),P(x,y,z0)];push(x+w/2,y+.25,`<polygon class="${cls}" points="${pts(q)}" fill="url(#${grad})" filter="url(#glow)"/>`+poly(q,'url(#sheen)',null,0,.3));}
const PR={};
PR.glass=(x,y,w,d,h)=>box(x,y,w,d,h,'#8fbfe0',{topGrad:'url(#glassTop)',fGrad:'url(#glassR)',lGrad:'url(#glassL)',rGrad:'url(#glassR)',stroke:'#dfeefadd',sw:1});
PR.plant=(x,y,s=1)=>{shadow(x,y,s,s,.24);box(x+.3*s,y+.3*s,.42*s,.42*s,.5*s,'#7f5636');const c=P(x+.5*s,y+.5*s,.5*s);let g=`<g filter="url(#soft)">`;for(const[dx,dy,r,col]of[[0,-11*s,13*s,'#3f7d46'],[-10*s,-3*s,11*s,'#4f9a55'],[10*s,-5*s,10*s,'#356e3d'],[0,-19*s,9*s,'#5aa862']])g+=`<ellipse cx="${c[0]+dx}" cy="${c[1]+dy}" rx="${r}" ry="${r*.86}" fill="${col}"/>`;push(x+.5*s,y+.5*s+.5,g+`</g>`);};
PR.chair=(x,y,dir='n',col='#242b38')=>{shadow(x+.1,y+.1,.7,.7,.18);box(x+.15,y+.15,.55,.55,.48,col);const b={n:[.15,.12,.55,.12],s:[.15,.68,.55,.12],w:[.12,.15,.12,.55],e:[.68,.15,.12,.55]}[dir];box(x+b[0],y+b[1],b[2],b[3],1,shade(col,1.15));};
PR.desk=(x,y,mon='cool')=>{shadow(x,y,2.1,1.05,.26);box(x,y,2.1,1.05,.82,'#9a6b3f',{gloss:1,topGrad:'url(#woodTop)'});panelFace(x+.35,y+.16,.9,.66,.46,mon==='cool'?'monA':'monB','scr scrP');panelFace(x+1.15,y+.16,.9,.5,.4,mon==='cool'?'monB':'monA','scr scrP');box(x+.62,y+.28,.1,.1,.14,'#161b24',{z0:.82});box(x+1.36,y+.28,.1,.1,.14,'#161b24',{z0:.82});};

PR.sofa=(x,y,col='#2f3d63')=>{shadow(x,y,2.3,1,.24);box(x,y,2.3,1,.46,col);box(x,y,2.3,.22,.9,shade(col,1.2));box(x,y,.22,1,.76,shade(col,1.2));box(x+2.08,y,.22,1,.76,shade(col,1.2));};
PR.armchair=(x,y,col='#33406a')=>{shadow(x,y,1,1,.22);box(x,y,1,1,.46,col);box(x,y,1,.2,.85,shade(col,1.2));box(x,y,.2,1,.72,shade(col,1.2));box(x+.8,y,.2,1,.72,shade(col,1.2));};
PR.coffee=(x,y)=>{shadow(x,y,1.3,.9,.18);box(x,y,1.3,.9,.34,'#1a2333',{gloss:1,topGrad:'url(#glassTop)'});};
PR.conf=(x,y,w=3,d=2.6,fin)=>{const[wc,wt]=woodOf(fin);shadow(x,y,w,d,.26);box(x,y,w,d,.78,wc,{gloss:1,topGrad:wt});};
PR.books=(x,y)=>{shadow(x,y,1.6,.6,.22);box(x,y,1.6,.6,1.9,'#4a3320');let s=`<g>`;const c=['#7a2f2f','#2f5a7a','#5a7a2f','#7a6a2f','#5a2f7a'];for(let r=0;r<4;r++)for(let i=0;i<7;i++){const bx=x+.12+i*.2;s+=poly([P(bx,y,.55+r*.4),P(bx+.15,y,.55+r*.4),P(bx+.15,y,.25+r*.4),P(bx,y,.25+r*.4)],c[(i+r)%5],'#0003',.4);}push(x+.8,y+.15,s+`</g>`);};
PR.cabinet=(x,y)=>{shadow(x,y,.9,.7,.2);box(x,y,.9,.7,1,'#aeb6bf',{topGrad:'url(#metalTop)'});const p=P(x,y,.5),p2=P(x+.9,y,.5);push(x+.45,y+.16,`<line x1="${p[0]}" y1="${p[1]}" x2="${p2[0]}" y2="${p2[1]}" stroke="#7a828c" stroke-width="1.5"/>`);};
PR.board=(x,y,w=3,h=1.7,grad='dealGrad',cls='scr dash')=>{shadow(x,y,w,.25,.16);box(x,y,w,.22,h,'#121a26');panelFace(x+.12,y,.5,w-.24,h-.5,grad,cls);};
PR.recep=(x,y,w=4)=>{shadow(x,y,w,1.4,.28);box(x,y,w,1.4,1.05,'#b98d5a',{gloss:1,topGrad:'url(#woodTop)'});box(x-.1,y-.1,w+.2,.25,1.15,'#caa06a',{topGrad:'url(#metalTop)'});};
PR.stool=(x,y)=>{shadow(x,y,.5,.5,.14);box(x+.1,y+.1,.35,.35,.62,'#2a3346',{topGrad:'url(#metalTop)'});};
PR.bar=(x,y,w=3)=>{shadow(x,y,w,.8,.22);box(x,y,w,.8,1,'#5a3d24',{gloss:1,topGrad:'url(#woodTop)'});};
PR.lamp=(x,y)=>{box(x+.2,y+.2,.1,.1,1.4,'#3a3320');const c=P(x+.25,y+.25,1.5);push(x+.25,y+.65,`<ellipse cx="${c[0]}" cy="${c[1]}" rx="13" ry="9" fill="url(#lampGlow)"/>`);};

function segNear(nx,ny){if(MODE==='fp')return false;if(YAW){const cs=Math.cos(YAW),sn=Math.sin(YAW);return (nx*sn+ny*cs)>0.2;}return ny>0.2;}
function hasNeighbor(r,side){const e=0.06;return model.rooms.some(o=>{if(o===r||o.hidden)return false;

// build type→label and same-category sibling maps from the palette GROUPS
const NON_SWAP=new Set(['room','zone','spawn','entry','text']);
const TYPE_LABEL={},TYPE_GROUP={},GROUP_SIBS={};
GROUPS.forEach(([gname,items])=>{const sibs=items.map(it=>it[0]).filter(t=>!NON_SWAP.has(t));items.forEach(([t,lb])=>{TYPE_LABEL[t]=lb;TYPE_GROUP[t]=gname;if(!NON_SWAP.has(t))GROUP_SIBS[t]=sibs;});});
// ---- style families: a highlighted object opens the full gallery of styles in its family (e.g. a table shows every table style) ----
const FAMILY={
 'Table':['conf','roundtable','squaretable','cafetable','poseur','coffee','sidetable'],
 'Seat':['chair','armchair','execchair','sofa','loveseat','stool','bench','ottoman'],

};
const FAMILY_TYPES={},FAMILY_NAME={};
Object.entries(FAMILY).forEach(([fam,types])=>types.forEach(t=>{FAMILY_TYPES[t]=types;FAMILY_NAME[t]=fam;}));
let _altctx=null;
function altChip(cls,attrs,inner){return `<button class="altchip ${cls}" ${attrs}>${inner}</button>`;}
// builds the "Alternatives" section rendered inside the right inspector for the single selected object
function altSectionHTML(s){
  if(!s)return '';const o=s.obj;let body='';
  const grp=(label,inner)=>inner?`<label>${label}</label><div class="altrow">${inner}</div>`:'';
  if(s.kind==='prop'){
    const fam=FAMILY_TYPES[o.t]||[o.t],famName=FAMILY_NAME[o.t]||'Style';
    if(fam.length>1)body+=`<label>${famName} styles</label><div class="altgridp">${fam.map(t=>altChip(t===o.t?'cur':'',`data-act="swap" data-v="${t}"`,`${icon(t)}<span>${TYPE_LABEL[t]||t}</span>`)).join('')}</div>`;
    const vl=VAR[o.t]||[];_altctx={vl};
    vl.forEach((g,i)=>{let row='';
      if(g.t==='color')row=g.opts.map(c=>`<button class="altsw ${String(o.args[g.arg]||'').toLowerCase()===c.toLowerCase()?'cur':''}" data-act="var" data-i="${i}" data-v="${c}" style="background:${c}"></button>`).join('');
      else if(g.t==='chip')row=g.opts.map(([v,lb])=>altChip(String(o.args[g.arg])===String(v)?'cur':'',`data-act="var" data-i="${i}" data-v="${v}"`,`<span>${lb}</span>`)).join('');
      else if(g.t==='size')row=g.opts.map(([lb,val],j)=>altChip(o.args[g.arg]==val[0]?'cur':'',`data-act="size" data-i="${i}" data-j="${j}"`,`<span>${lb}</span>`)).join('');
      else if(g.t==='size1')row=g.opts.map(([lb,val],j)=>altChip(o.args[g.arg]==val?'cur':'',`data-act="size" data-i="${i}" data-j="${j}"`,`<span>${lb}</span>`)).join('');
      body+=grp(g.n,row);});
  }else if(s.kind==='room'){
    body+=grp('Size',[['Small',6,5],['Medium',9,7],['Large',12,9]].map(([lb,w,d])=>altChip(o.w===w&&o.d===d?'cur':'',`data-act="rsize" data-w="${w}" data-d="${d}"`,`<span>${lb}</span>`)).join(''));
  }else if(s.kind==='zone'){
    body+=grp('Size',[['Small',3,3],['Medium',4,4],['Large',6,5]].map(([lb,w,d])=>altChip(o.w===w&&o.d===d?'cur':'',`data-act="zsize" data-w="${w}" data-d="${d}"`,`<span>${lb}</span>`)).join(''));
  }
  if(!body)return '';
  return `<div class="altsec"><label class="altsec-h">◆ Alternatives</label>${body}</div>`;
}
// one delegated handler on the inspector for every alternatives click — applies in place, keeps selection
panel.addEventListener('click',e=>{const b=e.target.closest('[data-act]');if(!b)return;
  if(selSet.length!==1||!sel)return;const o=sel.obj,act=b.dataset.act;
  if(act==='swap'){const t=b.dataset.v;if(t===o.t)return;const x=o.args[0],y=o.args[1];o.t=t;o.args=[x,y,...((PROP_DEF[t]||[]).slice())];delete ACT.raises[o.id];delete ACT.ext['raise:'+o.id];}
  else if(act==='var'){const g=_altctx.vl[+b.dataset.i];o.args[g.arg]=b.dataset.v;if(o.t==='raise'&&g.arg===5)delete ACT.raises[o.id];}
  else if(act==='size'){const g=_altctx.vl[+b.dataset.i],val=g.opts[+b.dataset.j][1];if(g.t==='size'){o.args[g.arg]=val[0];o.args[g.arg+1]=val[1];}else o.args[g.arg]=val;}
  else if(act==='rsize'){o.w=+b.dataset.w;o.d=+b.dataset.d;}
  else if(act==='zsize'){o.w=+b.dataset.w;o.d=+b.dataset.d;}
  else return;
  render();drawSel();buildPanel();pushHistory();});
function segm(id,cb){const el=document.getElementById(id);if(!el)return;el.querySelectorAll('button').forEach(b=>b.onclick=()=>{el.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');cb(b.dataset.v);});}
function buildPanel(){renderInspector();buildLayers();}
function renderInspector(){
  if(!selSet.length){panel.innerHTML=`<h3>Inspector</h3><div class="empty"><svg class="eic" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.4"><rect x="3" y="4" width="18" height="14" rx="2"/><path d="M3 9h18M9 18v3M15 18v3M7 21h10"/></svg><div class="hint" style="text-align:left"><b>Drag</b> furnishings from the left onto the floor.<br><br><b>Single-click</b> to select · <b>double-click</b> to unlock movement — the object turns <span style="color:#4ade80">green</span>, then drag to reposition, resize (gold corner) or rotate (blue handle). <span class="kbd">Esc</span> re-locks.<br><br>Shift-click or rubber-band to multi-select · right-click for more · <span class="kbd">Del</span> removes.<br><br><b>Stacked items:</b> click the same spot again (or <span class="kbd">Alt</span>-click) to reach the one underneath.<br><br><b>Navigate:</b> scroll to zoom · middle-drag to pan · <b>right-drag to orbit</b> the map · switch to <b>1ST PERSON</b> to walk the office (WASD · drag to look · click to move).</div></div>`;return;}
  if(selSet.length>1){
    const nr=selSet.filter(s=>s.kind==='room').length,nz=selSet.filter(s=>s.kind==='zone').length,np=selSet.length-nr-nz;
    panel.innerHTML=`<h3><span class="chip room">${selSet.length} selected</span></h3><div class="sub">${nr} rooms · ${nz} zones · ${np} furnishings</div>
    <label>Align</label><div class="aligngrid">
      <button class="abtn" data-al="left" title="Align left">⇤</button><button class="abtn" data-al="cx" title="Align centres">⇔</button><button class="abtn" data-al="right" title="Align right">⇥</button>
      <button class="abtn" data-al="top" title="Align top">⤒</button><button class="abtn" data-al="cy" title="Align middles">⇕</button><button class="abtn" data-al="bottom" title="Align bottom">⤓</button></div>
    <label>Distribute</label><div class="itog"><button class="abtn" data-di="h" title="Distribute horizontally" style="flex:1">↔ Horizontal</button><button class="abtn" data-di="v" title="Distribute vertically" style="flex:1">↕ Vertical</button></div>
    <div class="hint" style="margin-top:12px">Drag any highlighted item to move the group · <span class="kbd">⌘C</span>/<span class="kbd">⌘V</span> to copy.</div>
    <button class="dup" id="f_dup">⧉ DUPLICATE GROUP</button><button class="del" id="f_del">DELETE GROUP</button>`;
    panel.querySelectorAll('[data-al]').forEach(b=>b.onclick=()=>alignSel(b.dataset.al));
    panel.querySelectorAll('[data-di]').forEach(b=>b.onclick=()=>distributeSel(b.dataset.di));
    document.getElementById('f_dup').onclick=dupSel;document.getElementById('f_del').onclick=delSel;return;
  }
  if(sel.kind==='zone'){const o=sel.obj;
    panel.innerHTML=`<h3><span class="chip zone">Zone</span></h3><div class="sub">${(o.label||ZLB[o.kind]||'—')}</div>
    <label>Name</label><input id="f_label" placeholder="${ZLB[o.kind]||'Zone'}" value="${(o.label||'').replace(/"/g,'&quot;')}">
    <label>Zone type</label><div class="matgrid" style="grid-template-columns:1fr 1fr" id="zk">${ZKINDS.map(k=>`<button class="mat ${k===o.kind?'on':''}" data-k="${k}"><span class="msw" style="background:${ZCOL[k].stroke}"></span><small>${ZLB[k]}</small></button>`).join('')}</div>
    ${altSectionHTML(sel)}
    <div class="hint" style="margin-top:14px">Zones are proximity areas (audio, meeting, focus). Double-click to unlock movement, then drag to move · drag the corner to resize.</div>
    <button class="dup" id="f_dup">⧉ DUPLICATE</button><button class="del" id="f_del">DELETE ZONE</button>`;
    document.getElementById('f_label').oninput=e=>{o.label=e.target.value;render();drawSel();};
    panel.querySelectorAll('#zk .mat').forEach(b=>b.onclick=()=>{o.kind=b.dataset.k;render();buildPanel();drawSel();});
    document.getElementById('f_dup').onclick=dupSel;document.getElementById('f_del').onclick=delSel;
    return;
  }
  const s=sel;
  if(s.kind==='room'){const o=s.obj;
    panel.innerHTML=`<h3><span class="chip room">Room</span></h3><div class="sub">${o.label||'—'}</div>
    <label>Name</label><input id="f_label" value="${(o.label||'').replace(/"/g,'&quot;')}">
    <label>Floor material</label><div class="matgrid" id="mat">${FLOORS.map(f=>`<button class="mat ${f===o.floor?'on':''}" data-f="${f}"><span class="msw" style="background:${FLOOR_SW[f]}"></span><small>${FLOOR_LB[f]}</small></button>`).join('')}</div>
    <label>Flooring pattern</label><div class="patgrid" id="pat">${PATS.map(p=>`<button class="pat ${p===o.pat?'on':''}" data-p="${p}"><span class="ppv" style="background:${PAT_PV[p]}"></span><small>${PAT_LB[p]}</small></button>`).join('')}</div>
    <label>Layout</label><div class="segm" id="seg_build"><button data-v="" class="${!o.build?'on':''}">Room</button><button data-v="corridor" class="${o.build==='corridor'?'on':''}">Corridor</button><button data-v="trading" class="${o.build==='trading'?'on':''}">Trading</button></div>
    ${altSectionHTML(s)}
    <div class="hint" style="margin-top:14px">Double-click on the canvas to unlock movement, then drag to move · drag the gold corner to resize.</div>
    <button class="dup" id="f_dup">⧉ DUPLICATE</button><button class="del" id="f_del">DELETE ROOM</button>`;
    document.getElementById('f_label').oninput=e=>{o.label=e.target.value;render();drawSel();};
    document.querySelectorAll('#mat .mat').forEach(b=>b.onclick=()=>{o.floor=b.dataset.f;render();buildPanel();drawSel();});
    document.querySelectorAll('#pat .pat').forEach(b=>b.onclick=()=>{o.pat=b.dataset.p;render();buildPanel();drawSel();});
    segm('seg_build',v=>{o.build=v||null;render();drawSel();});
    document.getElementById('f_dup').onclick=dupSel;document.getElementById('f_del').onclick=delSel;
  } else {
    const o=s.obj,isRaise=o.t==='raise',isJumbo=o.t==='jumbo';
    let h=`<h3><span class="chip prop">${isRaise?'Raise Station':isJumbo?'Jumbotron':o.t}</span></h3><div class="sub">${isRaise?(o.args[2]||'Company'):isJumbo?'Head-wall display':'Furnishing'}</div>`;
    if(isRaise){const ac=o.args[6]||'#38d0ff',pc=Math.round(+o.args[5]||0);
      h+=`<label>Company name</label><input id="r_name" value="${(o.args[2]||'').replace(/"/g,'&quot;')}">`;
      h+=`<label>Round</label><div class="segm" id="r_round">${['PRE-SEED','SEED','SERIES A','SERIES B','SERIES C'].map(r=>`<button data-v="${r}" class="${(o.args[3]||'').toUpperCase()===r?'on':''}">${r.replace('PRE-SEED','Pre').replace('SERIES ','S-').replace('SEED','Seed')}</button>`).join('')}</div>`;
      h+=`<label>Raise amount</label><input id="r_amt" placeholder="$2.4M" value="${(o.args[4]||'').replace(/"/g,'&quot;')}">`;
      h+=`<label>% Funded — <b id="r_pctl" style="color:var(--gold2)">${pc}%</b></label><input type="range" id="r_pct" min="0" max="100" value="${pc}" class="rng">`;
      h+=`<label>Accent colour</label><div class="swatches" data-ai="6">${SW.map(c=>`<span class="sw ${c.toLowerCase()===ac.toLowerCase()?'on':''}" data-c="${c}" data-ai="6" style="background:${c}"></span>`).join('')}<input type="color" value="${ac}" data-ai="6" style="width:26px;height:24px;padding:0;border:1px solid var(--line);border-radius:7px;background:#0a1120"></div>`;
    } else if(isJumbo){const ac=o.args[7]||'#38d0ff',mode=o.args[4]||'live';
      h+=`<label>Headline</label><input id="j_head" value="${(o.args[3]||'').replace(/"/g,'&quot;')}">`;
      h+=`<label>Main display</label><div class="segm" id="j_mode"><button data-v="live" class="${mode==='live'?'on':''}">Live leaderboard</button><button data-v="text" class="${mode==='text'?'on':''}">Custom text</button></div>`;
      if(mode==='live')h+=`<div class="hint">Ranks the top 5 company stations on this floor by % funded — updates automatically.</div>`;
      else h+=`<label>Custom message</label><input id="j_msg" placeholder="DEMO DAY 2026" value="${(o.args[5]||'').replace(/"/g,'&quot;')}">`;
      h+=`<label>Ticker</label><input id="j_tk" placeholder="Auto — scrolls station raises" value="${(o.args[6]||'').replace(/"/g,'&quot;')}">`;
      h+=`<label>Accent colour</label><div class="swatches" data-ai="7">${SW.map(c=>`<span class="sw ${c.toLowerCase()===ac.toLowerCase()?'on':''}" data-c="${c}" data-ai="7" style="background:${c}"></span>`).join('')}<input type="color" value="${ac}" data-ai="7" style="width:26px;height:24px;padding:0;border:1px solid var(--line);border-radius:7px;background:#0a1120"></div>`;
    } else o.args.slice(2).forEach((v,j)=>{const idx=j+2;
      if(typeof v==='string'&&/^#/.test(v)){h+=`<label>Colour</label><div class="swatches" data-ai="${idx}">${SW.map(c=>`<span class="sw ${c.toLowerCase()===v.toLowerCase()?'on':''}" data-c="${c}" data-ai="${idx}" style="background:${c}"></span>`).join('')}<input type="color" value="${v}" data-ai="${idx}" style="width:26px;height:24px;padding:0;border:1px solid var(--line);border-radius:7px;background:#0a1120"></div>`;}
      else if(v==='cool'||v==='warm'){h+=`<label>Screen tone</label><div class="segm" data-seg="${idx}"><button data-v="cool" class="${v==='cool'?'on':''}">Cool</button><button data-v="warm" class="${v==='warm'?'on':''}">Warm</button></div>`;}
    });
    h+=altSectionHTML(s);
    h+=`<label>Orientation</label><div class="rotrow"><button class="rbtn" id="rL" title="Rotate left">⟲</button><button class="rbtn" id="rR" title="Rotate right">⟳</button><button class="rbtn" id="rS" title="Straighten">⌖</button></div>`;
    h+=`<label>Interactive</label><div class="segm" id="seg_act">${['none','link','embed','seat'].map(a=>`<button data-v="${a}" class="${(o.action||'none')===a?'on':''}">${a==='none'?'None':a[0].toUpperCase()+a.slice(1)}</button>`).join('')}</div>`;

    if(isJumbo){
      document.getElementById('j_head').oninput=e=>{o.args[3]=e.target.value;render();};
      segm('j_mode',v=>{o.args[4]=v;render();buildPanel();drawSel();});
      const jm=document.getElementById('j_msg');if(jm)jm.oninput=e=>{o.args[5]=e.target.value;render();};

    segm('seg_act',v=>{o.action=v==='none'?null:v;render();buildPanel();drawSel();});
    {const li=document.getElementById('f_link');if(li)li.oninput=()=>{o.link=li.value;render();};document.getElementById('f_note').oninput=e=>{o.note=e.target.value;render();};}
    const rot=d=>{o.rot=+(((o.rot||0)+d)).toFixed(4);render();drawSel();pushHistory();};
    document.getElementById('rL').onclick=()=>rot(-Math.PI/2);
    document.getElementById('rR').onclick=()=>rot(Math.PI/2);
    document.getElementById('rS').onclick=()=>{o.rot=0;render();drawSel();pushHistory();toast('Straightened');};
    document.getElementById('f_dup').onclick=dupSel;document.getElementById('f_del').onclick=delSel;

  el.querySelectorAll('[data-load]').forEach(b=>b.onclick=()=>{const m=layStore()[b.dataset.load];if(m){model=JSON.parse(JSON.stringify({rooms:m.rooms,props:m.props,zones:m.zones||[],blocked:m.blocked||{},walls:m.walls||{}}));clearSel();render();buildPanel();drawSel();pushHistory();layModal.classList.remove('on');toast('Loaded '+b.dataset.load);}});
  el.querySelectorAll('[data-del]').forEach(b=>b.onclick=()=>{layDel(b.dataset.del);renderLayList();toast('Deleted layout');});}
document.getElementById('btnLayouts').onclick=()=>{document.getElementById('layName').value='';renderLayList();layModal.classList.add('on');};
document.getElementById('layClose').onclick=()=>layModal.classList.remove('on');
document.getElementById('laySaveBtn').onclick=()=>{const n=document.getElementById('layName').value.trim();if(!n){toast('Name it first');return;}laySave(n);renderLayList();document.getElementById('layName').value='';toast('Saved '+n);};
window.addEventListener('resize',()=>{applyView();drawSel();});
// collapsible inspector panel
const panelWrap=document.getElementById('panelWrap'),panelToggle=document.getElementById('panelToggle');
let panelAnim;function togglePanel(force){const c=force!==undefined?force:!panelWrap.classList.contains('collapsed');panelWrap.classList.toggle('collapsed',c);panelCollapsed=c;panelToggle.title=(c?'Show':'Hide')+' inspector (I)';cancelAnimationFrame(panelAnim);const start=Date.now();const step=()=>{applyView();drawSel();if(Date.now()-start<300)panelAnim=requestAnimationFrame(step);};step();}
panelToggle.onclick=()=>togglePanel();
buildPal();buildPanel();render();pushHistory();enterView();
(function(){var fpBtn=document.createElement('button');fpBtn.id='viewfp';fpBtn.type='button';
  var setLbl=function(){fpBtn.innerHTML=(MODE==='fp'?'▲ TOP VIEW':'◱ WALK THE OFFICE');};setLbl();
  fpBtn.onclick=function(){if(MODE==='fp'){mRows.onclick();}else{mIso.onclick();}setLbl();};
  document.getElementById('stage').appendChild(fpBtn);
})();
</script>

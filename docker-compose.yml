version: "3.9"

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    restart: unless-stopped

  virtual-office-server:
    build:
      context: ./server
    ports:
      - "4000:4000"
    environment:
      PORT: "4000"
      REDIS_URL: "redis://redis:6379"
      SUPABASE_URL: "${SUPABASE_URL}"
      SUPABASE_SERVICE_ROLE_KEY: "${SUPABASE_SERVICE_ROLE_KEY}"
    depends_on:
      - redis
    restart: unless-stopped

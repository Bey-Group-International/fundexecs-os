# Apply database migrations to the PRODUCTION Supabase project on merge to main.
#
# Why this exists: preview branches (per-PR) always got their migrations, but the
# production database fell ~11 migrations behind because nothing applied repo
# migrations to prod on merge. This workflow closes that gap: every push to main
# that touches supabase/migrations/** runs `supabase db push` against production,
# so the live schema always matches the merged code.
#
# Required repository secrets (Settings → Secrets and variables → Actions):
#   SUPABASE_ACCESS_TOKEN  — a Supabase personal access token (account → tokens)
#   SUPABASE_PROJECT_REF   — the production project ref: qhxcvvidhnwdgemjeaug
#   SUPABASE_DB_PASSWORD   — the production database password
#
# `supabase db push --include-all` applies every local migration whose version is
# not already in the remote history — including files whose timestamps sort before
# the remote head, which happens routinely when parallel sessions merge migrations
# out of timestamp order (without the flag the CLI refuses and the run goes red).
# It never re-applies recorded versions, so reruns are idempotent. Note the flag
# bypasses timestamp-ordering only, not dependency ordering: an out-of-order file
# still runs after later-stamped ones already applied, so migrations must remain
# dependency-safe (IF NOT EXISTS-style guards), per this repo's convention.
name: DB Migrate

on:
  push:
    branches: [main]
    paths:
      - "supabase/migrations/**"
  workflow_dispatch: {}

permissions:
  contents: read

# Never let two production migration pushes run at once.
concurrency:
  group: db-migrate-production
  cancel-in-progress: false

jobs:
  migrate:
    name: Apply migrations to production
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@ab058987d8d6c725971f6cf9d0b5c98467e30bd1 # v1.7.1
        with:
          version: latest

      - name: Link production project
        run: supabase link --project-ref "$SUPABASE_PROJECT_REF"
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

      - name: Push migrations to production
        run: supabase db push --include-all
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Uses `npm ci` when a committed package-lock.json is present
      # (reproducible), otherwise falls back to `npm install`. package.json
      # is version-pinned either way.
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Prettier check
        run: npm run format:check

      # Build first so Next generates next-env.d.ts and .next/types/* that
      # the standalone typecheck step depends on.
      - name: Build
        run: npm run build
        env:
          # Public placeholders so the build can statically analyze pages
          # that import the Supabase client. Real values come from Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run inside the merge queue so required checks resolve on the queued
  # (post-merge) state. Required for the "Require merge queue" ruleset rule.
  merge_group:

# Least-privilege default token: jobs only read the repo. Artifact upload uses
# the Actions artifact API (not `contents`), so read is sufficient.
permissions:
  contents: read

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # Uses `npm ci` when a committed package-lock.json is present
      # (reproducible), otherwise falls back to `npm install`. package.json
      # is version-pinned either way. Retries on transient registry/network
      # resets (ECONNRESET) so CI doesn't red on infra flakes.
      - name: Install dependencies
        run: |
          install() { if [ -f package-lock.json ]; then npm ci; else npm install; fi; }
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 120000
          n=0
          until install; do
            n=$((n+1))
            if [ "$n" -ge 4 ]; then echo "npm install failed after $n attempts" >&2; exit 1; fi
            echo "npm install attempt $n failed; retrying in $((n*10))s..." >&2
            sleep $((n*10))
          done

      - name: Prettier check
        run: npm run format:check

      # Fast, deterministic regression suite for Earn's pure logic (model
      # escalation, tool confirm-vs-auto, nav allowlist, snapshot formatting).
      # No network / API key — runs before the heavier build.
      - name: Unit tests
        run: npm run test:unit

      # Build first so Next generates next-env.d.ts and .next/types/* that
      # the standalone typecheck step depends on.
      - name: Build
        run: npm run build
        env:
          # Public placeholders so the build can statically analyze pages
          # that import the Supabase client. Real values come from Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  e2e:
    name: Playwright e2e smoke
    runs-on: ubuntu-latest
    env:
      # Real Supabase env when the E2E_SUPABASE_* secrets are set (which arms
      # the authed shell tour against the seeded test user); public
      # placeholders otherwise — the app is resilient to placeholders and the
      # authed specs self-skip, so the suite passes either way.
      NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.E2E_SUPABASE_URL || 'https://placeholder.supabase.co' }}
      NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.E2E_SUPABASE_ANON_KEY || 'placeholder-anon-key' }}
      # Optional GitHub secrets. When set (with real Supabase env above), the
      # authed e2e specs run; otherwise they self-skip and the suite still
      # passes. Seed the user once with `npm run seed:e2e` — see e2e/README.md.
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # Retries on transient registry/network resets (ECONNRESET) — this job
      # has been the one most often tripped by npm-registry flakes.
      - name: Install dependencies
        run: |
          install() { if [ -f package-lock.json ]; then npm ci; else npm install; fi; }
          npm config set fetch-retries 5
          npm config set fetch-retry-factor 2
          npm config set fetch-retry-mintimeout 10000
          npm config set fetch-retry-maxtimeout 120000
          n=0
          until install; do
            n=$((n+1))
            if [ "$n" -ge 4 ]; then echo "npm install failed after $n attempts" >&2; exit 1; fi
            echo "npm install attempt $n failed; retrying in $((n*10))s..." >&2
            sleep $((n*10))
          done

      - name: Install Playwright browsers
        run: |
          n=0
          until npx playwright install --with-deps chromium; do
            n=$((n+1))
            if [ "$n" -ge 3 ]; then echo "playwright install failed after $n attempts" >&2; exit 1; fi
            echo "playwright install attempt $n failed; retrying in $((n*10))s..." >&2
            sleep $((n*10))
          done

      # playwright.config.ts builds & starts the production server via its
      # `webServer`, so this single step covers build + serve + test.
      - name: Run e2e smoke suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

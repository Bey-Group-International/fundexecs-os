name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # Run inside the merge queue so required checks resolve on the queued
  # (post-merge) state. Required for the "Require merge queue" ruleset rule.
  merge_group:

# Least-privilege default token: jobs only read the repo. Artifact upload uses
# the Actions artifact API (not `contents`), so read is sufficient.
permissions:
  contents: read

# Cancel in-progress runs for the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Typecheck, lint & build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # Uses `npm ci` when a committed package-lock.json is present
      # (reproducible), otherwise falls back to `npm install`. package.json
      # is version-pinned either way.
      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Prettier check
        run: npm run format:check

      # Build first so Next generates next-env.d.ts and .next/types/* that
      # the standalone typecheck step depends on.
      - name: Build
        run: npm run build
        env:
          # Public placeholders so the build can statically analyze pages
          # that import the Supabase client. Real values come from Vercel.
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key

      - name: Typecheck
        run: npm run typecheck

      - name: Lint
        run: npm run lint

  e2e:
    name: Playwright e2e smoke
    runs-on: ubuntu-latest
    env:
      # Public placeholders so the build inside Playwright's webServer can
      # statically analyze pages that import the Supabase client. Real values
      # come from Vercel; the app is resilient when these are placeholders.
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      # Optional GitHub secrets. When set, the auth happy-path test runs;
      # otherwise it self-skips and the suite still passes.
      E2E_TEST_EMAIL: ${{ secrets.E2E_TEST_EMAIL }}
      E2E_TEST_PASSWORD: ${{ secrets.E2E_TEST_PASSWORD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then npm ci; else npm install; fi

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      # playwright.config.ts builds & starts the production server via its
      # `webServer`, so this single step covers build + serve + test.
      - name: Run e2e smoke suite
        run: npm run test:e2e

      - name: Upload Playwright report
        if: ${{ !cancelled() }}
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

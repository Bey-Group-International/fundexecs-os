# skills/ic-memo/policy.yaml
# Execution + governance policy for the IC Memorandum (Pre-Read). Enforced by the
# runtime (lib/skills/runner.ts) and the executive registry
# (lib/executives/registry.ts).
approval_tier: 1            # Tier 1 — internal, reversible pre-read. Not a decision.
risk_classification: low

# The runtime rejects a run whose assigned executive is not in this list
# (canRunSkill). Maps to lib/executives/registry.ts ExecutiveKeys.
allowed_executives:
  - investment_committee

# Data the skill may read. The runtime does not grant scopes beyond these.
data_scopes:
  - deal:read
  - ic_memo:read

# Actions the skill may NEVER take, even to prepare (also encoded on the manifest
# and cross-checked against the executive's prohibited actions).
prohibited_actions:
  - submit_term_sheet
  - sign_document
  - move_capital
  - capital_call
  - distribute_report

# Hard rules the skill core must honour (validated by evaluation.yaml cases).
guardrails:
  - The skill PREPARES a memo; it NEVER makes the investment decision.
  - Every recommendation is PRELIMINARY and advisory — labelled, never a decision.
  - A missing input becomes an open item; it is never a fabricated financial or market value.
  - Provided figures are facts; the derived verdict→posture mapping is an assumption; standard lists are generated.
  - Output must validate against output.schema.json before it is persisted.

# This pre-read is a leaf assembly step — it seeds no downstream skill.
downstream: []

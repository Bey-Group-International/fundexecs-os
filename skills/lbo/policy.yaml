# skills/lbo/policy.yaml
# Execution + governance policy for the LBO Returns Model skill. Enforced by the
# runtime (lib/skills/runner.ts) and the executive registry (lib/executives/registry.ts).
approval_tier: 1            # Tier 1 — internal, reversible. Runs within an approved mandate.
risk_classification: low

# The runtime rejects a run whose assigned executive is not in this list
# (canRunSkill). These map to lib/executives/registry.ts ExecutiveKeys.
allowed_executives:
  - analyst

# Data the skill may read. The runtime does not grant scopes beyond these.
data_scopes:
  - deal:read
  - financial_model:read

# Actions the skill may NEVER take, even to prepare (also encoded on the manifest
# and cross-checked against the executive's prohibited actions).
prohibited_actions:
  - send_outreach
  - distribute_report
  - sign_document
  - move_capital

# Hard rules the skill core must honour (validated by evaluation.yaml cases).
guardrails:
  - Never fabricate a financial assumption; a missing required input is flagged in missingInputs and the affected output is null, not invented.
  - MOIC and IRR are computed only when entry EBITDA, entry multiple, and hold years are all present, else null.
  - Entry equity must be positive for a MOIC; a non-positive entry equity yields null MOIC and IRR.
  - Every conservative default (exit multiple = entry multiple, 0% growth, 0 paydown, 0 fees, all-equity) is labelled as an assumption, never a fact.
  - Every supplied figure is a fact; every derived figure (entryEV, debt, entryEquity, exit EBITDA/EV/equity, MOIC, IRR) is a calculation.
  - When both debtAmount and leverageMultiple are supplied, debtAmount takes precedence.
  - The LBO model is advisory analysis — it never authorizes a capital-binding action.
  - Output must validate against output.schema.json before it is persisted.

# The follow-on this skill's output may seed (all still gated by the runtime).
downstream:
  - returns
  - ic-memo

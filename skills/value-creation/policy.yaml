# skills/value-creation/policy.yaml
# Execution + governance policy for the Value-Creation Plan. Enforced by the
# runtime (lib/skills/runner.ts) and the executive registry
# (lib/executives/registry.ts).
approval_tier: 1            # Tier 1 — internal, reversible. Portfolio-ops planning within mandate.
risk_classification: low

# The runtime rejects a run whose assigned executive is not in this list
# (canRunSkill). These map to lib/executives/registry.ts ExecutiveKeys.
allowed_executives:
  - portfolio_ops

# Data the skill may read. The runtime does not grant scopes beyond these.
data_scopes:
  - company:read
  - value_creation_plan:read

# Actions the skill may NEVER take, even to prepare (also encoded on the manifest
# and cross-checked against the executive's prohibited actions).
prohibited_actions:
  - distribute_report
  - move_capital
  - sign_document

# Hard rules the skill core must honour (validated by evaluation.yaml cases).
guardrails:
  - Never fabricate a financial value; a missing initiative impact is treated as 0 and flagged, not invented.
  - Every computed figure is labelled a calculation; the 100-day plan is labelled generated.
  - The plan is advisory analysis — it never authorizes a capital-binding action.
  - Output must validate against output.schema.json before it is persisted.

# The follow-on this skill's output may seed (none for now).
downstream: []

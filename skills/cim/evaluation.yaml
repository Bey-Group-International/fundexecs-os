# skills/cim/evaluation.yaml
# Golden evaluation cases for CIM Outline (Draft). These are the acceptance
# fixtures a production skill must pass — full-CIM assembly, the never-fabricate
# guardrail (missing financials become a flagged placeholder, never a number),
# historical rows as facts, fact vs generated labelling, anonymization of
# management names, and the review-before-distribution recommendation. Exercised by
# lib/skills/catalog/cim.test.ts.
cases:
  - name: full_cim_all_sections_complete
    input:
      deal:
        codename: Project Atlas
        sector: Industrial Software
        description: A vertical SaaS platform for logistics operators. Rapidly scaling ARR.
        revenue: 50
        ebitda: 12
        growthRate: 35
        historicalFinancials:
          - { year: 2023, revenue: 30, ebitda: 6 }
          - { year: 2024, revenue: 40, ebitda: 9 }
        products: [Dispatch automation, Fleet analytics]
        management:
          - { name: Jane Doe, role: CEO }
          - { name: John Roe, role: CFO }
        marketNotes: Large, fragmented logistics software TAM growing double digits.
        transactionAsk: Majority recapitalization to fund M&A.
    expect:
      sectionKeys: [executiveSummary, companyOverview, marketOverview, productsServices, financialSummary, management, transactionOverview]
      allComplete: true
      missingFields: []

  - name: missing_financials_placeholder_never_fabricated
    input:
      deal:
        codename: Project Bare
        sector: Healthcare
        description: A clinic network.
    expect:
      financialSummaryStatus: placeholder
      financialSummaryBody: "[Financial summary to be provided]"
      neverInvents: true

  - name: supplied_revenue_is_a_fact
    input:
      deal:
        codename: Project Atlas
        revenue: 50
    expect:
      revenueSourceKind: fact
      revenueValue: 50

  - name: historical_rows_are_facts
    input:
      deal:
        codename: Project Atlas
        historicalFinancials:
          - { year: 2023, revenue: 30, ebitda: 6 }
    expect:
      fy2023RevenueSourceKind: fact
      fy2023RevenueValue: 30

  - name: anonymized_by_default_withholds_management_names
    input:
      deal:
        codename: Project Atlas
        management:
          - { name: Jane Doe, role: CEO }
    expect:
      anonymized: true
      managementOmitsName: Jane Doe
      managementKeepsRole: CEO

  - name: recommends_review_before_distribution
    input:
      deal:
        codename: Project Thin
    expect:
      recommendedActionContains: [review, distribution]
      placeholderCount: 7

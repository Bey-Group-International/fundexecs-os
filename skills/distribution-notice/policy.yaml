# skills/distribution-notice/policy.yaml
# Execution + governance policy for Distribution Notice. Enforced by the runtime
# (lib/skills/runner.ts) and the executive registry (lib/executives/registry.ts).
approval_tier: 1            # Tier 1 — PREPARATION only. Assembles a draft; releases nothing.
risk_classification: moderate

# The runtime rejects a run whose assigned executive is not in this list
# (canRunSkill). These map to lib/executives/registry.ts ExecutiveKeys.
allowed_executives:
  - investor_relations

# Data the skill may read. The runtime does not grant scopes beyond these.
data_scopes:
  - fund:read
  - investor:read
  - distribution:read

# Actions the skill may NEVER take, even to prepare (also encoded on the manifest
# and cross-checked against the executive's prohibited actions).
prohibited_actions:
  - move_capital
  - distribute_report
  - send_reply
  - sign_document

# Hard rules the skill core must honour (validated by evaluation.yaml cases).
guardrails:
  - Prepares a DRAFT notice only — it NEVER moves capital and NEVER sends the notice.
  - Releasing funds is a Tier-3 human decision; transmitting the notice is a Tier-2 human decision.
  - Never fabricate an amount, date, or bank detail; a missing input becomes an open item.
  - Requires fundName and distributionAmount, else they are flagged as missing.
  - Output must validate against output.schema.json before it is persisted.

# This skill seeds no automated downstream — any send or payment is a human step.
downstream: []

# skills/screen-deal/skill.yaml
# Authoring spec for the Deal Screening skill. The machine-readable manifest that
# the runtime loads is the TypeScript SkillDefinition in
# lib/skills/catalog/screen-deal.ts; this YAML is the human-facing contract and
# must stay consistent with it (asserted by lib/skills/skill-package.test.ts).
id: screen-deal
name: Deal Screening
version: 1.0.0
owner: fundexecs
hub: run

applicable_executives:
  - analyst
  - investment_committee
  - diligence

supported_entity_types: [deal, company, mandate]

required_inputs:
  - mandate
  - deal.companyName

optional_inputs:
  - deal.sector
  - deal.geography
  - deal.revenue
  - deal.ebitda
  - deal.enterpriseValue
  - deal.askingPrice
  - deal.ownership
  - deal.transactionType

outputs:
  - verdict            # pass | watch | fail
  - mandateFit         # sector / geography / size fit + overall 0-100
  - preliminaryValuation
  - keyRisks
  - missingFields
  - diligencePriorities
  - recommendedAction

artifact_types: [analysis]
data_permissions: [deal:read, mandate:read]
tools: []

approval_tier: 1           # internal, reversible analysis
risk_classification: low
execution_timeout_ms: 15000
retry_policy:
  max_attempts: 1
  backoff_ms: 0

provider_capabilities:
  - structured_extraction
  - financial_reasoning

allowed_downstream_skills: [returns, dd-checklist, ic-memo]

prohibited_actions:
  - send_outreach
  - distribute_report
  - sign_document
  - move_capital
  - capital_call

input_schema: input.schema.json
output_schema: output.schema.json
policy: policy.yaml
evaluation: evaluation.yaml

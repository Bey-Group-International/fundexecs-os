# skills/dd-checklist/policy.yaml
# Execution + governance policy for the Diligence Request List. Enforced by the
# runtime (lib/skills/runner.ts) and the executive registry
# (lib/executives/registry.ts).
approval_tier: 1            # Tier 1 — internal, reversible. Prepares a request list.
risk_classification: low

# The runtime rejects a run whose assigned executive is not in this list
# (canRunSkill). Maps to lib/executives/registry.ts ExecutiveKeys.
allowed_executives:
  - diligence

# Data the skill may read. The runtime does not grant scopes beyond these.
data_scopes:
  - deal:read

# Actions the skill may NEVER take, even to prepare. Issuing the request list to a
# counterparty is a Tier-2 action (send_diligence_request) and is out of scope.
prohibited_actions:
  - send_diligence_request
  - send_outreach
  - sign_document

# Hard rules the skill core must honour (validated by evaluation.yaml cases).
guardrails:
  - The base catalog is a standard template — items are labelled generated, not facts about the company.
  - Tailoring is additive and rule-based; it only ever adds items, never removes them.
  - Missing deal context is flagged in missingContext, never invented.
  - This skill PREPARES the request list only; it never sends the request out.
  - Output must validate against output.schema.json before it is persisted.

# The follow-on this skill's output may seed (all still gated by the runtime).
downstream:
  - dd-prep
  - ic-memo

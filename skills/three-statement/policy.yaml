# skills/three-statement/policy.yaml
# Execution + governance policy for the Three-Statement Projection skill. Enforced
# by the runtime (lib/skills/runner.ts) and the executive registry
# (lib/executives/registry.ts).
approval_tier: 1            # Tier 1 — internal, reversible. Runs within an approved mandate.
risk_classification: low

# The runtime rejects a run whose assigned executive is not in this list
# (canRunSkill). These map to lib/executives/registry.ts ExecutiveKeys.
allowed_executives:
  - analyst

# Data the skill may read. The runtime does not grant scopes beyond these.
data_scopes:
  - deal:read
  - financial_model:read

# Actions the skill may NEVER take, even to prepare (also encoded on the manifest
# and cross-checked against the executive's prohibited actions).
prohibited_actions:
  - send_outreach
  - distribute_report
  - sign_document

# Hard rules the skill core must honour (validated by evaluation.yaml cases).
guardrails:
  - Never fabricate a driver; a missing required driver is flagged in missingInputs and the projection is NOT produced.
  - The balance sheet must tie out (assets = liabilities + equity) every year; the model balances by construction and balanceCheck is ~0.
  - When beginningEquity is omitted it is derived as a balancing plug and labelled an assumption; when supplied and the opening balance sheet does not tie out, the imbalance is flagged, never silently adjusted.
  - Every supplied driver is a fact; every projected line item is a calculation; the equity plug and held-constant debt are assumptions.
  - The projection is advisory analysis — it never authorizes a capital-binding action.
  - Output must validate against output.schema.json before it is persisted.

# The follow-on this skill's output may seed (all still gated by the runtime).
downstream:
  - dcf
  - ic-memo

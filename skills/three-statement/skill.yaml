# skills/three-statement/skill.yaml
# Authoring spec for the Three-Statement Projection skill. The machine-readable
# manifest that the runtime loads is the TypeScript SkillDefinition in
# lib/skills/catalog/three-statement.ts; this YAML is the human-facing contract and
# must stay consistent with it.
id: three-statement
name: Three-Statement Projection
version: 1.0.0
owner: fundexecs
hub: run

applicable_executives:
  - analyst

supported_entity_types: [deal, company, financial_model]

required_inputs: []

optional_inputs:
  - years
  - baseRevenue
  - revenueGrowth
  - ebitdaMargin
  - daPctOfRevenue
  - taxRate
  - capexPctOfRevenue
  - nwcPctOfRevenue
  - beginningCash
  - beginningPPE
  - beginningDebt
  - beginningEquity

outputs:
  - years
  - projection         # per-year IS/CF/BS line items + balanceCheck
  - balances           # true when the balance sheet ties out every year
  - missingInputs
  - recommendedAction

artifact_types: [analysis]
data_permissions: [deal:read, financial_model:read]
tools: []

approval_tier: 1           # internal, reversible analysis
risk_classification: low
execution_timeout_ms: 15000
retry_policy:
  max_attempts: 1
  backoff_ms: 0

provider_capabilities:
  - financial_reasoning

allowed_downstream_skills: [dcf, ic-memo]

prohibited_actions:
  - send_outreach
  - distribute_report
  - sign_document

input_schema: input.schema.json
output_schema: output.schema.json
policy: policy.yaml
evaluation: evaluation.yaml

# skills/raise-pipeline/policy.yaml
# Execution + governance policy for Raise Pipeline. Enforced by the runtime
# (lib/skills/runner.ts) and the executive registry (lib/executives/registry.ts).
approval_tier: 1            # Tier 1 — internal, reversible. Runs within an approved mandate.
risk_classification: low

# The runtime rejects a run whose assigned executive is not in this list
# (canRunSkill). These map to lib/executives/registry.ts ExecutiveKeys.
allowed_executives:
  - capital_formation

# Data the skill may read. The runtime does not grant scopes beyond these.
data_scopes:
  - lp:read
  - fund:read
  - raise:read

# Actions the skill may NEVER take, even to prepare (also encoded on the manifest
# and cross-checked against the executive's prohibited actions).
prohibited_actions:
  - send_outreach
  - send_intro_request
  - sign_document
  - capital_call
  - move_capital

# Hard rules the skill core must honour (validated by evaluation.yaml cases).
guardrails:
  - Aggregates ONLY the prospect set the caller supplies; it never invents or fabricates prospects or commitments.
  - An empty prospect set returns an empty roll-up plus the note "No prospects supplied — this skill aggregates a provided prospect set; it does not fabricate prospects."
  - Every supplied figure (expectedTicket, probability) is a fact; a stage-default probability is a labelled assumption; every derived figure (weightedExpected, committedAmount, coveragePct, gapToTarget) is a labelled calculation.
  - weightedExpected is a probability-weighted calculation, NOT a binding commitment; committedAmount is a sum of supplied figures, NOT a capital call.
  - A raise target supplied with no prospects is flagged, never filled; a missing target yields null coverage and is flagged.
  - Output must validate against output.schema.json before it is persisted.

# The follow-on this skill's output may seed (all still gated by the runtime).
downstream: []

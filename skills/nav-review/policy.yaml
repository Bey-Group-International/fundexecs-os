# skills/nav-review/policy.yaml
# Execution + governance policy for NAV Tie-Out Review. Enforced by the runtime
# (lib/skills/runner.ts) and the executive registry (lib/executives/registry.ts).
approval_tier: 1            # Tier 1 — internal, reversible. Prepares a tie-out; approves nothing.
risk_classification: moderate

# The runtime rejects a run whose assigned executive is not in this list
# (canRunSkill). These map to lib/executives/registry.ts ExecutiveKeys.
allowed_executives:
  - fund_admin

# Data the skill may read. The runtime does not grant scopes beyond these.
data_scopes:
  - fund:read
  - nav:read

# Actions the skill may NEVER take, even to prepare (also encoded on the manifest
# and cross-checked against the executive's prohibited actions).
prohibited_actions:
  - post_journal_entry
  - distribute_report
  - move_capital
  - close_period

# Hard rules the skill core must honour (validated by evaluation.yaml cases).
guardrails:
  - Never fabricate a financial value; a missing prior/reported NAV is flagged, not invented.
  - An absent flow component is treated as 0 but labelled as an assumption, never as a fact.
  - Every computed figure is a calculation; the roll-forward math is deterministic.
  - This skill only PREPARES a NAV tie-out for human review; NAV approval and LP reporting are never performed here.
  - Output must validate against output.schema.json before it is persisted.

# The follow-on this skill's output may seed (all still gated by the runtime).
downstream:
  - lp-update

# skills/kyc-screen/policy.yaml
# Execution + governance policy for KYC / AML Screening. Enforced by the runtime
# (lib/skills/runner.ts) and the executive registry (lib/executives/registry.ts).
approval_tier: 1            # Tier 1 — internal, reversible screening support.
risk_classification: elevated

# The runtime rejects a run whose assigned executive is not in this list
# (canRunSkill). Maps to lib/executives/registry.ts ExecutiveKeys.
allowed_executives:
  - risk_compliance

# Data the skill may read. The runtime does not grant scopes beyond these.
data_scopes:
  - subject:read
  - screening:read

# Actions the skill may NEVER take, even to prepare (also encoded on the manifest
# and cross-checked against the executive's prohibited actions).
prohibited_actions:
  - sign_document
  - execute_subdoc
  - move_capital

# Hard rules the skill core must honour (validated by evaluation.yaml cases).
guardrails:
  - This skill NEVER approves onboarding and NEVER makes a final compliance determination.
  - screeningStatus is only ever clear_for_review, incomplete, or escalate — NEVER "approved" or "clear".
  - A sanctions hit, a PEP flag, or any failed check ALWAYS escalates and routes the exception to a compliance officer.
  - A missing document or check is flagged, never invented; provided figures are facts, computed figures are calculations.
  - recommendedAction always states that a compliance officer makes the final onboarding determination.
  - Output must validate against output.schema.json before it is persisted.

# The follow-on this skill's output may seed (all still gated by the runtime).
downstream:
  - policy-check

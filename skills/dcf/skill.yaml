# skills/dcf/skill.yaml
# Authoring spec for the Discounted Cash Flow skill. The machine-readable
# manifest that the runtime loads is the TypeScript SkillDefinition in
# lib/skills/catalog/dcf.ts; this YAML is the human-facing contract and must
# stay consistent with it.
id: dcf
name: Discounted Cash Flow
version: 1.0.0
owner: fundexecs
hub: run

applicable_executives:
  - analyst

supported_entity_types: [deal, company, financial_model]

required_inputs:
  - companyName

optional_inputs:
  - baseFcf
  - projectionYears
  - fcfGrowth
  - discountRate
  - terminalGrowth
  - netDebt
  - sharesOutstanding

outputs:
  - enterpriseValue
  - equityValue
  - perShare
  - pvExplicit
  - pvTerminal
  - terminalValue
  - cashFlows         # per-year FCF and its present value
  - sensitivities     # EV at discountRate ±0.01 and terminalGrowth ±0.005
  - assumptionsUsed
  - missingFields
  - keyRisks
  - recommendedAction

artifact_types: [model, analysis]
data_permissions: [deal:read, financial_model:read]
tools: []

approval_tier: 1           # internal, reversible analysis
risk_classification: low
execution_timeout_ms: 15000
retry_policy:
  max_attempts: 1
  backoff_ms: 0

provider_capabilities:
  - financial_reasoning

allowed_downstream_skills: [ic-memo]

prohibited_actions:
  - send_outreach
  - distribute_report
  - sign_document
  - move_capital

input_schema: input.schema.json
output_schema: output.schema.json
policy: policy.yaml
evaluation: evaluation.yaml

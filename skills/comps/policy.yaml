# skills/comps/policy.yaml
# Execution + governance policy for Comparable Company Analysis. Enforced by the
# runtime (lib/skills/runner.ts) and the executive registry (lib/executives/registry.ts).
approval_tier: 1            # Tier 1 — internal, reversible. Runs within an approved mandate.
risk_classification: low

# The runtime rejects a run whose assigned executive is not in this list
# (canRunSkill). These map to lib/executives/registry.ts ExecutiveKeys.
allowed_executives:
  - analyst

# Data the skill may read. The runtime does not grant scopes beyond these.
data_scopes:
  - deal:read
  - company:read
  - financial_model:read

# Actions the skill may NEVER take, even to prepare (also encoded on the manifest
# and cross-checked against the executive's prohibited actions).
prohibited_actions:
  - send_outreach
  - distribute_report
  - sign_document
  - move_capital

# Hard rules the skill core must honour (validated by evaluation.yaml cases).
guardrails:
  - Never fabricate a financial value; a missing input is flagged in missingFields, not invented.
  - Statistics (count, median, mean, min, max) are computed only from provided comparable multiples.
  - An implied value is null when the subject metric is missing OR that multiple has zero comparables.
  - Every provided figure is a fact; every statistic and implied value is a calculation.
  - The analysis is advisory — it never authorizes a capital-binding action.
  - Output must validate against output.schema.json before it is persisted.

# The follow-on this skill's output may seed (all still gated by the runtime).
downstream:
  - ic-memo

# skills/market-map/policy.yaml
# Execution + governance policy for the Market Map. Enforced by the runtime
# (lib/skills/runner.ts) and the executive registry (lib/executives/registry.ts).
approval_tier: 1            # Tier 1 — internal, reversible. Organizes a provided company set.
risk_classification: low

# The runtime rejects a run whose assigned executive is not in this list
# (canRunSkill). Maps to lib/executives/registry.ts ExecutiveKeys.
allowed_executives:
  - research

# Data the skill may read. The runtime does not grant scopes beyond these.
data_scopes:
  - company:read

# Actions the skill may NEVER take, even to prepare (also encoded on the manifest
# and cross-checked against the executive's prohibited actions).
prohibited_actions:
  - send_outreach
  - distribute_report
  - sign_document

# Hard rules the skill core must honour (validated by evaluation.yaml cases).
guardrails:
  - This skill organizes a company set the caller supplies into segments — it NEVER researches, invents, or enriches companies or market claims.
  - Provided company names are facts the caller asserted; the grouping is a calculation; any narrative is generated.
  - An empty company set yields an empty map plus the missing-context note "No companies supplied — this skill maps a provided company set; it does not research or fabricate companies." — it never fills the map with invented companies.
  - Companies with no segment are grouped under "Unsegmented" and flagged, never assigned an invented segment.
  - Output must validate against output.schema.json before it is persisted.

# The follow-on this skill's output may seed (all still gated by the runtime).
downstream:
  - source-deals

# skills/deal-tracker/evaluation.yaml
# Golden evaluation cases for Deal Tracker. These are the acceptance fixtures a
# production skill must pass — roll-up correctness, the never-fabricate guardrail
# (empty set returns empty roll-up with a note), at-risk detection (blocked or
# critical-not-done), and fact/assumption/calculation labelling. Exercised by
# lib/skills/catalog/deal-tracker.test.ts.
cases:
  - name: rolls_up_supplied_set
    input:
      deal:
        name: Project Atlas
        stage: signing
        targetCloseDate: "2026-09-30"
      milestones:
        - label: CP checklist
          status: done
          owner: Legal
          dueDate: "2026-08-01"
        - label: Disclosure schedules
          status: in_progress
          owner: Legal
          dueDate: "2026-09-01"
        - label: Board consent
          status: not_started
          owner: Corp Sec
          dueDate: "2026-09-15"
        - label: Funds flow
          status: in_progress
          owner: Finance
          dueDate: "2026-09-25"
    expect:
      totalMilestones: 4
      completionPct: 25
      overallStatus: on_track

  - name: empty_milestones_never_fabricates
    input:
      deal:
        name: Project Atlas
      milestones: []
    expect:
      tracked: []
      totalMilestones: 0
      missingContext: "No milestones supplied — this skill tracks a provided milestone set; it does not fabricate milestones."
      neverInvents: true

  - name: blocked_flagged_at_risk
    input:
      deal:
        name: Project Atlas
      milestones:
        - label: Escrow agreement
          status: blocked
          owner: Legal
        - label: KYC pack
          status: done
          owner: Compliance
    expect:
      overallStatus: at_risk
      atRisk: Escrow agreement
      nextAction: "Unblock: Escrow agreement"

  - name: critical_not_done_flagged_at_risk
    input:
      deal:
        name: Project Atlas
      milestones:
        - label: Regulatory approval
          status: in_progress
          critical: true
    expect:
      overallStatus: at_risk
      atRisk: Regulatory approval
      nextAction: "Advance critical: Regulatory approval"

  - name: defaulted_status_is_assumption
    input:
      deal:
        name: Project Atlas
      milestones:
        - label: Signature pages
    expect:
      defaultedStatus: not_started
      statusSourceKind: assumption
      neverInvents: true

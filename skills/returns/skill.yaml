# skills/returns/skill.yaml
# Authoring spec for the Preliminary Returns Case skill. The machine-readable
# manifest that the runtime loads is the TypeScript SkillDefinition in
# lib/skills/catalog/returns.ts; this YAML is the human-facing contract and must
# stay consistent with it.
id: returns
name: Preliminary Returns Case
version: 1.0.0
owner: fundexecs
hub: run

applicable_executives:
  - analyst
  - investment_committee

supported_entity_types: [deal, company, financial_model]

required_inputs:
  - deal.companyName

optional_inputs:
  - deal.entryEbitda
  - deal.entryMultiple
  - deal.netDebt
  - deal.equityContribution
  - assumptions.holdYears
  - assumptions.exitMultiple
  - assumptions.ebitdaCagr
  - assumptions.annualDebtPaydown

outputs:
  - entryEv
  - entryEquity
  - exitEbitda
  - exitEv
  - exitEquity
  - moic              # multiple of invested capital (x)
  - irrPct            # annualised IRR (%)
  - remainingDebt
  - sensitivities     # bear / base / bull at exit multiple ∓ 1
  - assumptionsUsed
  - keyRisks
  - missingFields
  - recommendedAction

artifact_types: [model, analysis]
data_permissions: [deal:read, financial_model:read]
tools: []

approval_tier: 1           # internal, reversible analysis
risk_classification: low
execution_timeout_ms: 15000
retry_policy:
  max_attempts: 1
  backoff_ms: 0

provider_capabilities:
  - financial_reasoning

allowed_downstream_skills: [ic-memo]

prohibited_actions:
  - send_outreach
  - distribute_report
  - sign_document
  - move_capital
  - capital_call

input_schema: input.schema.json
output_schema: output.schema.json
policy: policy.yaml
evaluation: evaluation.yaml
